<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ルアー在庫管理</title>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none;}
html{font-size:62.5%;overscroll-behavior:none;-webkit-text-size-adjust:100%;}
body{font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;font-size:1.4rem;background:linear-gradient(135deg,#1a6b3c 0%,#0d4f8c 100%);width:100%;height:100dvh;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;}
*::-webkit-scrollbar{display:none;}
:root{
  --green-mid:#25a55a;--blue-mid:#1976d2;--blue-light:#42a5f5;--teal:#00bcd4;
  --yellow:#ffd740;--red:#f44336;--orange:#ff9800;
  --text-dark:#1a1a2e;--text-mid:#37474f;
  --tab-h:7rem;--h-inp:4.4rem;--h-btn:4.8rem;--r:.8rem;
  --fs-xs:1.1rem;--fs-sm:1.25rem;--fs-md:1.4rem;--fs-lg:1.7rem;

  /* ブロック別ヘッダー色 */
  --hdr-red:   #e53935;
  --hdr-yellow:#f57f17;
  --hdr-blue:  #1565c0;
  --hdr-green: #00F562;   /* 詳細情報ヘッダー */
  --hdr-orange:#e65100;   /* 商品情報ヘッダー */

  /* ブロック別背景色（ヘッダー色の薄版・最下層） */
  --bg-red:    #fff5f5;
  --bg-yellow: #fffbf0;
  --bg-blue:   #f0f6ff;
  --bg-green:  #f0fff6;
  --bg-orange: #fff8f0;
}

/* ── LOADING ── */
.loading-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;}
.loading-ov.show{display:flex;}
.spinner{width:4rem;height:4rem;border:.4rem solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{color:#fff;font-size:var(--fs-md);font-weight:700;}

/* ── TOAST ── */
.toast{display:none;position:fixed;top:1.6rem;left:50%;transform:translateX(-50%);z-index:998;padding:.8rem 2rem;border-radius:2rem;font-size:var(--fs-sm);font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3);background:var(--green-mid);}
.toast.err{background:var(--red);}
.toast.show{display:block;animation:fadeInOut 2.5s ease forwards;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-8px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}75%{opacity:1;}100%{opacity:0;}}

/* ── DIALOG ── */
.dialog-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;align-items:center;justify-content:center;padding:0 1.6rem;}
.dialog-ov.open{display:flex;}
.dialog-box{background:#fff;border-radius:1.6rem;padding:2.4rem 2rem 2rem;width:100%;max-width:40rem;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.dialog-title{font-size:var(--fs-lg);font-weight:800;color:var(--text-dark);margin-bottom:1rem;text-align:center;}
.dialog-msg{font-size:var(--fs-md);color:var(--text-mid);margin-bottom:1.6rem;line-height:1.6;text-align:center;white-space:pre-wrap;}
.dialog-btns{display:flex;gap:1rem;}
.dialog-cancel{flex:1;border-radius:var(--r);cursor:pointer;font-weight:700;background:#fff;border:.2rem solid var(--red);color:var(--red);font-size:var(--fs-md);height:var(--h-btn);}
.dialog-ok{flex:1;border-radius:var(--r);cursor:pointer;font-weight:700;background:var(--blue-mid);border:none;color:#fff;font-size:var(--fs-md);height:var(--h-btn);}

/* ── SCAN ── */
.scan-ov{display:none;position:fixed;inset:0;background:#000;z-index:800;flex-direction:column;align-items:center;justify-content:center;}
.scan-ov.open{display:flex;}
.scan-wrap{position:relative;width:100%;max-width:48rem;}
#scan-video{width:100%;display:block;}
.scan-guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;height:12rem;border:.3rem solid var(--yellow);border-radius:.8rem;box-shadow:0 0 0 999px rgba(0,0,0,.45);}
.scan-line{position:absolute;top:0;left:0;right:0;height:.3rem;background:var(--yellow);animation:scanLine 2s ease-in-out infinite;}
@keyframes scanLine{0%{top:0;}50%{top:calc(100% - .3rem);}100%{top:0;}}
.scan-label{color:#fff;font-size:var(--fs-md);font-weight:700;margin-top:2rem;text-align:center;}
.scan-cancel{margin-top:2rem;padding:1rem 3rem;background:rgba(255,255,255,.15);border:.2rem solid rgba(255,255,255,.5);border-radius:2rem;color:#fff;font-size:var(--fs-md);font-weight:700;cursor:pointer;}

/* ── TAB ── */
.tab-bar{position:absolute;bottom:0;left:0;right:0;height:var(--tab-h);background:rgba(13,79,140,.97);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(0,0,0,.25);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;cursor:pointer;border:none;background:none;padding:0;color:rgba(255,255,255,.5);border-top:.3rem solid transparent;}
.tab-btn.active{color:#fff;border-top-color:var(--yellow);}
.tab-icon{font-size:2.4rem;line-height:1;}
.tab-label{font-size:var(--fs-xs);font-weight:700;}

/* ── SCREENS ── */
.screen{position:absolute;top:0;left:0;right:0;bottom:var(--tab-h);overflow-y:auto;overflow-x:hidden;display:none;padding:.8rem .8rem 2rem;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;}
.page-title{text-align:center;font-size:var(--fs-lg);font-weight:800;color:#fff;margin-bottom:.8rem;}

/* ── ブロックカード（背景色は各ブロック別に最下層で設定） ── */
.block-card{border-radius:1.2rem;padding:1rem;margin-bottom:.8rem;box-shadow:0 2px 8px rgba(0,0,0,.12);position:relative;}
/* 背景色レイヤー（最下層） */
.block-card::before{content:'';position:absolute;inset:0;border-radius:1.2rem;z-index:0;}
.block-card>*{position:relative;z-index:1;}

/* A: 検索ブロック → 薄い赤背景 */
.card-red::before{background:var(--bg-red);}
/* B: 商品情報ブロック → 薄いオレンジ背景 */
.card-orange::before{background:var(--bg-orange);}
/* C: 発送処理ブロック → 薄い青背景 */
.card-blue::before{background:var(--bg-blue);}
/* D: 詳細情報ブロック → 薄い緑背景 */
.card-green::before{background:var(--bg-green);}

/* ブロックタイトル */
.block-title{font-size:var(--fs-sm);font-weight:800;padding:.3rem .9rem;border-radius:.5rem;margin-bottom:.8rem;display:inline-block;}
.bt-red   {background:var(--hdr-red);   color:#fff;}
.bt-orange{background:var(--hdr-orange);color:#fff;}
.bt-blue  {background:var(--hdr-blue);  color:#fff;}
.bt-green {background:var(--hdr-green); color:#1a1a2e;} /* 黒文字 */

/* ── 共通ボタン・入力 ── */
.inp{width:100%;background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);padding:0 1rem;color:var(--text-dark);outline:none;font-size:var(--fs-md);font-weight:600;height:var(--h-inp);}
.inp:focus{border-color:var(--blue-mid);}
.sel-btn{width:100%;background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);padding:0 1rem;color:var(--text-dark);cursor:pointer;font-size:var(--fs-md);font-weight:600;height:var(--h-inp);display:flex;align-items:center;justify-content:space-between;}
.big-btn{width:100%;border-radius:var(--r);border:none;cursor:pointer;font-weight:800;color:#fff;height:var(--h-btn);font-size:var(--fs-md);display:flex;align-items:center;justify-content:center;gap:.4rem;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.big-btn:active{opacity:.8;}
.btn-scan  {background:linear-gradient(90deg,var(--green-mid),var(--teal));}
.btn-save  {background:linear-gradient(90deg,var(--blue-mid),var(--blue-light));}
.btn-clear {background:linear-gradient(90deg,#78909c,#90a4ae);}
.btn-danger{background:linear-gradient(90deg,var(--red),var(--orange));}
.btn-search{background:linear-gradient(90deg,var(--blue-mid),var(--blue-light));}
.btn-row{display:flex;gap:.8rem;margin-bottom:.8rem;}
.btn-row .big-btn{flex:1;}

/* ── A: 検索ブロック ── */
.search-block{display:flex;gap:.6rem;align-items:stretch;}
.scan-col{flex:0 0 9rem;}
.scan-col .big-btn{height:100%;min-height:calc(var(--h-inp)*2 + .4rem);flex-direction:column;gap:.3rem;font-size:var(--fs-sm);line-height:1.3;}
.search-right{flex:1;display:flex;flex-direction:column;gap:.4rem;}
.search-right .inp{height:var(--h-inp);}
.search-right .btn-search{height:var(--h-inp);font-size:var(--fs-sm);}

/* ① テキスト中央寄せ（search-inputのplaceholderとvalue） */
#search-input{text-align:center;}

/* ── B: 商品情報ブロック ── */
.product-layout{display:flex;gap:.8rem;align-items:flex-start;}
.product-img-col{flex:0 0 13rem;}
.product-img{width:13rem;height:13rem;border-radius:var(--r);object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.15);background:#f5f5f5;display:block;}
.no-img{width:13rem;height:13rem;background:#eceff1;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#90a4ae;font-size:1.2rem;gap:.3rem;}
.product-info-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:.4rem;}
.info-row{display:grid;grid-template-columns:5rem 1fr;align-items:baseline;gap:.3rem;}
.info-lbl{font-size:var(--fs-xs);font-weight:700;color:var(--hdr-orange);white-space:nowrap;}
.info-val{font-size:var(--fs-sm);font-weight:700;color:var(--text-dark);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── C: 発送処理ブロック ── */
.c-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;}
.c-lbl{font-size:var(--fs-sm);font-weight:700;color:var(--hdr-blue);white-space:nowrap;flex:0 0 5.5rem;}
.c-val{flex:1;}

/* ② 現在のステータスボタン → 販売済日・販売金額と同じ高さに統一 */
.cur-status-btn{
  width:100%;height:4rem;border-radius:var(--r);border:none;
  font-size:var(--fs-md);font-weight:800;cursor:default;
  background:linear-gradient(90deg,#1565c0,#1976d2);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.2);letter-spacing:.05em;
}
.chip-grp{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem;}
.chip{padding:.35rem .9rem;border-radius:2rem;border:.15rem solid #cfd8dc;cursor:pointer;font-size:var(--fs-sm);font-weight:700;background:#fff;color:var(--text-mid);white-space:nowrap;}
.chip.sel{background:var(--blue-mid);color:#fff;border-color:var(--blue-mid);}
.divider{height:.1rem;background:#cfd8dc;margin:.5rem 0;}

/* 販売済日・販売金額：1行表示 高さ統一 4rem */
.edit-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;}
.edit-lbl{font-size:var(--fs-sm);font-weight:700;color:var(--hdr-blue);white-space:nowrap;flex:0 0 5.5rem;}
.edit-inp{flex:1;background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);padding:0 .8rem;color:var(--text-dark);outline:none;font-size:var(--fs-md);font-weight:600;height:4rem;}
.edit-inp:focus{border-color:var(--blue-mid);}

/* ③④ ¥とテキストのズレ修正：flexで完全に垂直中央揃え */
.price-wrap{
  flex:1;display:flex;align-items:center;
  background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);
  height:4rem;overflow:hidden;
}
.price-prefix{
  flex:0 0 auto;
  padding:0 .1rem 0 .8rem;
  font-size:var(--fs-md);font-weight:700;
  color:var(--text-dark);
  line-height:1;
  display:flex;align-items:center;
}
.price-inp{
  flex:1;border:none;background:transparent;
  padding:0 .8rem 0 .2rem;
  color:var(--text-dark);font-size:var(--fs-md);font-weight:600;
  height:100%;outline:none;
  display:flex;align-items:center;
}

/* ── D: 詳細情報ブロック ── */
/* ⑤ フォント統一 */
.detail-grid{display:grid;grid-template-columns:5.5rem 1fr;gap:.45rem .5rem;align-items:baseline;}
.d-lbl{font-size:var(--fs-xs);font-weight:700;color:#00994a;white-space:nowrap;}
.d-val{font-size:var(--fs-sm);font-weight:700;color:var(--text-dark);word-break:break-all;}

/* ── 空状態 ── */
#ship-empty{text-align:center;padding:2.5rem 1rem;color:rgba(255,255,255,.7);font-size:var(--fs-md);line-height:1.8;}
#ship-empty .empty-icon{font-size:4rem;margin-bottom:1rem;}

/* ── 一括編集 ── */
.bulk-item{background:rgba(255,255,255,.95);border-radius:var(--r);padding:.7rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;box-shadow:0 1px 4px rgba(0,0,0,.1);}
.bulk-item-no{width:2.4rem;height:2.4rem;border-radius:50%;background:var(--blue-mid);color:#fff;font-size:var(--fs-xs);font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bulk-item-info{flex:1;min-width:0;}
.bulk-item-name{font-size:var(--fs-sm);font-weight:700;color:var(--text-dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bulk-item-sub{font-size:var(--fs-xs);color:#78909c;margin-top:.2rem;}
.bulk-item-del{width:3rem;height:3rem;border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:1.6rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bulk-count{text-align:center;font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.8);margin-bottom:.6rem;}
.bulk-form-section{background:rgba(255,255,255,.15);border-radius:1.2rem;padding:1rem;margin-bottom:.8rem;border:.1rem solid rgba(255,255,255,.2);}
.bulk-form-title{font-size:var(--fs-sm);font-weight:800;color:#fff;margin-bottom:.6rem;}
.form-row{margin-bottom:.7rem;}
.form-label{font-size:var(--fs-xs);font-weight:700;color:rgba(255,255,255,.9);margin-bottom:.3rem;}

/* ── ポップアップ ── */
.popup-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:850;align-items:flex-end;justify-content:center;}
.popup-ov.open{display:flex;}
.popup-sheet{background:#fff;border-radius:1.6rem 1.6rem 0 0;width:100%;max-width:48rem;max-height:70vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
.popup-head{padding:1.2rem 1.6rem .8rem;display:flex;align-items:center;justify-content:space-between;border-bottom:.1rem solid #e0e0e0;}
.popup-title{font-size:var(--fs-md);font-weight:800;color:var(--text-dark);}
.popup-close{width:3rem;height:3rem;border-radius:50%;background:#eceff1;border:none;cursor:pointer;font-size:1.8rem;display:flex;align-items:center;justify-content:center;}
.popup-list{overflow-y:auto;flex:1;padding:.4rem 0;}
.popup-item{padding:1rem 1.6rem;font-size:var(--fs-md);cursor:pointer;color:var(--text-dark);font-weight:600;border-bottom:.1rem solid #f5f5f5;}
.popup-item:active{background:#e3f2fd;}
.popup-item.selected{color:var(--blue-mid);font-weight:800;}
</style>
</head>
<body>

<!-- ローディング -->
<div class="loading-ov" id="loading-ov"><div class="spinner"></div><div class="loading-msg" id="loading-msg">読み込み中...</div></div>
<!-- トースト -->
<div class="toast" id="toast"></div>
<!-- ダイアログ -->
<div class="dialog-ov" id="dialog-ov">
  <div class="dialog-box">
    <div class="dialog-title" id="dialog-title"></div>
    <div class="dialog-msg" id="dialog-msg"></div>
    <div class="dialog-btns">
      <button class="dialog-cancel" id="dialog-cancel" style="display:none">キャンセル</button>
      <button class="dialog-ok" id="dialog-ok">OK</button>
    </div>
  </div>
</div>
<!-- カメラスキャン -->
<div class="scan-ov" id="scan-ov">
  <div class="scan-wrap">
    <video id="scan-video" playsinline autoplay muted></video>
    <div class="scan-guide"><div class="scan-line"></div></div>
  </div>
  <div class="scan-label">バーコードをガイド枠に合わせてください</div>
  <button class="scan-cancel" onclick="stopScan()">キャンセル</button>
</div>
<!-- ポップアップ -->
<div class="popup-ov" id="popup-ov">
  <div class="popup-sheet">
    <div class="popup-head">
      <div class="popup-title" id="popup-title">選択</div>
      <button class="popup-close" onclick="closePopup()">✕</button>
    </div>
    <div class="popup-list" id="popup-list"></div>
  </div>
</div>

<!-- ════════════════════════════════
     TAB1: 発送作業
════════════════════════════════ -->
<div class="screen active" id="screen-ship">
  <div class="page-title">🚚 発送作業</div>

  <!-- A: 検索ブロック（薄い赤背景） -->
  <div class="block-card card-red">
    <span class="block-title bt-red">🔍 検索</span>
    <div class="search-block">
      <div class="scan-col">
        <button class="big-btn btn-scan" onclick="startScan('ship')">📷<br>スキャン</button>
      </div>
      <div class="search-right">
        <input type="text" class="inp" id="search-input" placeholder="バーコード / 商品NO" inputmode="text">
        <button class="big-btn btn-search" onclick="searchManual()">🔍 検索</button>
      </div>
    </div>
  </div>

  <!-- 空状態 -->
  <div id="ship-empty">
    <div class="empty-icon">📦</div>
    バーコードをスキャンまたは<br>商品NOを入力して検索してください
  </div>

  <!-- 商品詳細（スキャン後表示） -->
  <div id="ship-detail" style="display:none">

    <!-- B: 商品情報ブロック（薄いオレンジ背景） -->
    <div class="block-card card-orange">
      <span class="block-title bt-orange">📦 商品情報</span>
      <div class="product-layout">
        <div class="product-img-col">
          <img id="ship-img" class="product-img" src="" alt="商品画像"
               onerror="this.style.display='none';document.getElementById('ship-no-img').style.display='flex'">
          <div id="ship-no-img" class="no-img" style="display:none">🖼️<span>画像なし</span></div>
        </div>
        <div class="product-info-col">
          <div class="info-row"><span class="info-lbl">BC</span><span class="info-val" id="ship-barcode">-</span></div>
          <div class="info-row"><span class="info-lbl">商品NO</span><span class="info-val" id="ship-no">-</span></div>
          <div class="info-row"><span class="info-lbl">保管BC</span><span class="info-val" id="ship-bc-storage">-</span></div>
          <div class="info-row"><span class="info-lbl">商品名</span><span class="info-val" id="ship-name">-</span></div>
          <div class="info-row"><span class="info-lbl">発送手段</span><span class="info-val" id="ship-method">-</span></div>
        </div>
      </div>
    </div>

    <!-- C: 発送処理ブロック（薄い青背景） -->
    <div class="block-card card-blue">
      <span class="block-title bt-blue">🚚 発送処理</span>
      <!-- ステータス（1行） -->
      <div class="c-row">
        <span class="c-lbl">ステータス</span>
        <div class="c-val">
          <div class="cur-status-btn" id="ship-cur-status">－</div>
        </div>
      </div>
      <!-- 変更チップ（販売済を除く6個） -->
      <div class="chip-grp" id="ship-status-chips"></div>
      <div class="divider"></div>
      <!-- 販売済日（1行・高さ4rem） -->
      <div class="edit-row">
        <span class="edit-lbl">📅 販売済日</span>
        <input type="date" class="edit-inp" id="ship-sold-date">
      </div>
      <!-- 販売金額（1行・¥ズレ修正・高さ4rem） -->
      <div class="edit-row">
        <span class="edit-lbl">💴 販売金額</span>
        <div class="price-wrap">
          <span class="price-prefix">¥</span>
          <input type="text" inputmode="numeric" class="price-inp" id="ship-sell-price" placeholder="0">
        </div>
      </div>
    </div>

    <!-- D: 詳細情報ブロック（薄い緑背景・ヘッダー#00F562・黒文字） -->
    <div class="block-card card-green">
      <span class="block-title bt-green">📋 詳細情報</span>
      <div class="detail-grid">
        <span class="d-lbl">状態</span>    <span class="d-val" id="ship-condition">-</span>
        <span class="d-lbl">メーカー</span><span class="d-val" id="ship-maker">-</span>
        <span class="d-lbl">カラー</span>  <span class="d-val" id="ship-color">-</span>
        <span class="d-lbl">サイズ</span>  <span class="d-val" id="ship-size">-</span>
        <span class="d-lbl">備考</span>    <span class="d-val" id="ship-note">-</span>
        <span class="d-lbl">購入金額</span><span class="d-val" id="ship-buy-price">-</span>
        <span class="d-lbl">購入日</span>  <span class="d-val" id="ship-buy-date">-</span>
      </div>
    </div>

    <!-- 保存・クリアボタン -->
    <div class="btn-row" style="margin-bottom:1rem">
      <button class="big-btn btn-save"  onclick="saveShipping()">💾 保存</button>
      <button class="big-btn btn-clear" onclick="clearShip()">🗑 クリア</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     TAB2: 一括編集
════════════════════════════════ -->
<div class="screen" id="screen-bulk">
  <div class="page-title">📝 一括編集</div>
  <button class="big-btn btn-scan" style="margin-bottom:.8rem" onclick="startScan('bulk')">📷 バーコードをスキャンして追加</button>
  <div class="bulk-count" id="bulk-count">0件 スキャン済み</div>
  <div id="bulk-list"></div>
  <div id="bulk-form" style="display:none">
    <div class="bulk-form-section">
      <div class="bulk-form-title">● 一括で変更する項目を入力</div>
      <div style="font-size:var(--fs-xs);color:rgba(255,255,255,.6);margin-bottom:.7rem">※空欄の項目は変更されません</div>
      <div class="form-row">
        <div class="form-label">ステータス</div>
        <div class="chip-grp" id="bulk-status-chips"></div>
      </div>
      <div class="form-row">
        <div class="form-label">発送手段</div>
        <button class="sel-btn" onclick="openPopup('bulk-ship-method')"><span id="bulk-ship-method-val">選択してください</span><span>▼</span></button>
      </div>
      <div class="form-row">
        <div class="form-label">📅 販売済日</div>
        <input type="date" class="inp" id="bulk-sold-date">
      </div>
      <div class="form-row">
        <div class="form-label">💴 販売金額</div>
        <div class="price-wrap" style="height:var(--h-inp)">
          <span class="price-prefix">¥</span>
          <input type="text" inputmode="numeric" class="price-inp" id="bulk-sell-price" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-label">📅 購入日</div>
        <input type="date" class="inp" id="bulk-buy-date">
      </div>
      <div class="form-row">
        <div class="form-label">💴 購入金額</div>
        <div class="price-wrap" style="height:var(--h-inp)">
          <span class="price-prefix">¥</span>
          <input type="text" inputmode="numeric" class="price-inp" id="bulk-buy-price" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-label">🏪 店名</div>
        <button class="sel-btn" onclick="openPopup('bulk-shop')"><span id="bulk-shop-val">選択してください</span><span>▼</span></button>
      </div>
      <div class="form-row">
        <div class="form-label">📦 商品名</div>
        <button class="sel-btn" onclick="openPopup('bulk-name')"><span id="bulk-name-val">選択してください</span><span>▼</span></button>
      </div>
    </div>
    <div class="btn-row" style="margin-bottom:1rem">
      <button class="big-btn btn-save"   onclick="saveBulk()">💾 一括保存</button>
      <button class="big-btn btn-danger" onclick="clearBulk()">🗑 全クリア</button>
    </div>
  </div>
</div>

<!-- タブバー -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-ship" onclick="changeTab('ship')"><span class="tab-icon">🚚</span><span class="tab-label">発送作業</span></button>
  <button class="tab-btn"        id="tab-bulk" onclick="changeTab('bulk')"><span class="tab-icon">📝</span><span class="tab-label">一括編集</span></button>
</div>

<script>
// ══════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════
const GAS_URL='https://script.google.com/macros/s/AKfycbzaeu3ATr2_vxLbi4IX2YP1SCSITgTxc-IOY4hdIVRLAFJNWrLaOkvT_un9kvCWiE1sbg/exec';
const IS_GAS=(typeof google!=='undefined')&&google.script&&google.script.run;
const SHIP_STATUSES=['在庫','検品済','保品','No有','出タイ待','出品'];
const ALL_STATUSES =['在庫','検品済','保品','No有','出タイ待','出品','販売済'];

let masters={statuses:ALL_STATUSES,shippings:[],shops:[],makers:[],nameList:[]};
let shipItem=null,shipStatus='';
let bulkItems=[],bulkStatus='',bulkShipMethod='',bulkShop='',bulkNameId='',bulkNameLabel='';
let scanMode='',codeReader=null,popupTarget='';

// ── GAS通信（JSONP対応） ──
function gasCall(fn,payload,ok,ng){
  if(IS_GAS){
    google.script.run.withSuccessHandler(r=>{if(ok)ok(r);}).withFailureHandler(e=>{if(ng)ng(e);else showToast('⚠️ 通信エラー','err');})[fn](payload);
    return;
  }
  // JSONP方式でCORSを回避
  const cbName='_cb_'+Date.now();
  window[cbName]=function(r){
    delete window[cbName];
    document.getElementById('jsonp-script')&&document.getElementById('jsonp-script').remove();
    if(ok)ok(r);
  };
  const s=document.createElement('script');
  s.id='jsonp-script';
  s.src=GAS_URL+'?fn='+encodeURIComponent(fn)+'&payload='+encodeURIComponent(JSON.stringify(payload))+'&callback='+cbName;
  s.onerror=()=>{delete window[cbName];s.remove();if(ng)ng(new Error('通信エラー'));else showToast('⚠️ 通信エラー','err');};
  document.head.appendChild(s);
}

// ── UI共通 ──
function showLoad(m){document.getElementById('loading-msg').textContent=m||'処理中...';document.getElementById('loading-ov').classList.add('show');}
function hideLoad(){document.getElementById('loading-ov').classList.remove('show');}
let _tt=null;
function showToast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast'+(type==='err'?' err':'')+' show';if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600);}
function showDialog(title,msg,okCb,cancelCb){
  document.getElementById('dialog-title').textContent=title;
  document.getElementById('dialog-msg').textContent=msg;
  const cb=document.getElementById('dialog-cancel');cb.style.display=cancelCb?'':'none';
  cb.onclick=()=>{closeDialog();if(cancelCb)cancelCb();};
  document.getElementById('dialog-ok').onclick=()=>{closeDialog();if(okCb)okCb();};
  document.getElementById('dialog-ov').classList.add('open');
}
function closeDialog(){document.getElementById('dialog-ov').classList.remove('open');}
function setText(id,val){const el=document.getElementById(id);if(el)el.textContent=val||'-';}
function changeTab(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
}

// ── ポップアップ ──
function openPopup(target){
  popupTarget=target;const listEl=document.getElementById('popup-list');listEl.innerHTML='';
  let items=[],title='選択',current='';
  if(target==='bulk-ship-method'){title='発送手段';items=masters.shippings;current=bulkShipMethod;}
  else if(target==='bulk-shop'){title='店名';items=masters.shops;current=bulkShop;}
  else if(target==='bulk-name'){title='商品名';items=masters.nameList.map(n=>n.name);current=bulkNameLabel;}
  document.getElementById('popup-title').textContent=title;
  items.forEach(item=>{
    const d=document.createElement('div');
    d.className='popup-item'+(item===current?' selected':'');
    d.textContent=item;d.onclick=()=>selectPopupItem(item);
    listEl.appendChild(d);
  });
  document.getElementById('popup-ov').classList.add('open');
}
function selectPopupItem(val){
  if(popupTarget==='bulk-ship-method'){bulkShipMethod=val;document.getElementById('bulk-ship-method-val').textContent=val;}
  else if(popupTarget==='bulk-shop'){bulkShop=val;document.getElementById('bulk-shop-val').textContent=val;}
  else if(popupTarget==='bulk-name'){bulkNameLabel=val;const f=masters.nameList.find(n=>n.name===val);bulkNameId=f?f.id:'';document.getElementById('bulk-name-val').textContent=val;}
  closePopup();
}
function closePopup(){document.getElementById('popup-ov').classList.remove('open');}

// ── ステータスチップ ──
function buildStatusChips(id,statusList,getV,setV){
  const grp=document.getElementById(id);grp.innerHTML='';
  statusList.forEach(s=>{
    const b=document.createElement('button');
    b.className='chip'+(getV()===s?' sel':'');b.textContent=s;
    b.onclick=()=>{setV(s);grp.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));b.classList.add('sel');};
    grp.appendChild(b);
  });
}

// ── ZXing スキャン ──
function startScan(mode){
  scanMode=mode;document.getElementById('scan-ov').classList.add('open');
  try{
    const hints=new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
      ZXing.BarcodeFormat.CODE_39,ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
    codeReader=new ZXing.BrowserMultiFormatReader(hints);
    codeReader.decodeFromVideoDevice(null,'scan-video',(result,err)=>{
      if(result){stopScan();fetchProduct(result.getText(),scanMode);}
    });
  }catch(e){stopScan();showToast('⚠️ カメラの起動に失敗しました','err');}
}
function stopScan(){if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}document.getElementById('scan-ov').classList.remove('open');}

// ── 手動検索 ──
function searchManual(){
  const val=document.getElementById('search-input').value.trim();
  if(!val){showToast('⚠️ バーコードまたは商品NOを入力してください','err');return;}
  fetchProduct(val,'ship');
}

// ── 商品検索 ──
function fetchProduct(barcode,mode){
  showLoad('商品照合中...');
  gasCall('getProductByBarcode',{barcode:barcode},res=>{
    hideLoad();
    if(res&&res.found){if(mode==='ship')showShipDetail(res.item);else addBulkItem(res.item);}
    else showToast('⚠️ 未登録のバーコードです','err');
  },()=>{hideLoad();showToast('⚠️ 通信エラー','err');});
}

// ── TAB1 発送作業 ──
function showShipDetail(item){
  shipItem=item;shipStatus=item.ステータス||'';
  document.getElementById('ship-empty').style.display='none';
  document.getElementById('ship-detail').style.display='block';
  const img=document.getElementById('ship-img'),noImg=document.getElementById('ship-no-img');
  if(item.imgUrl){img.src=item.imgUrl;img.style.display='block';noImg.style.display='none';}
  else{img.style.display='none';noImg.style.display='flex';}
  setText('ship-barcode',item.バーコード);
  setText('ship-no',item.商品NO);
  setText('ship-bc-storage',item.保管バーコード);
  setText('ship-name',item.商品名);
  setText('ship-method',item.発送手段);
  document.getElementById('ship-cur-status').textContent=item.ステータス||'－';
  setText('ship-condition',item.状態);
  setText('ship-maker',item.メーカー);
  setText('ship-color',item.カラー);
  setText('ship-size',item.サイズ数量);
  setText('ship-note',item.備考);
  setText('ship-buy-price',item.購入金額?'¥'+Number(item.購入金額).toLocaleString():'-');
  setText('ship-buy-date',item.購入日);
  const t=new Date();
  document.getElementById('ship-sold-date').value=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  document.getElementById('ship-sell-price').value=item.販売金額?String(item.販売金額):'';
  buildStatusChips('ship-status-chips',SHIP_STATUSES,()=>shipStatus,s=>{shipStatus=s;});
}
function saveShipping(){
  if(!shipItem){showToast('⚠️ 商品をスキャンしてください','err');return;}
  if(!shipStatus){showToast('⚠️ ステータスを選択してください','err');return;}
  const soldDate=document.getElementById('ship-sold-date').value;
  if(!soldDate){showToast('⚠️ 販売済日を入力してください','err');return;}
  const sellPrice=document.getElementById('ship-sell-price').value.replace(/[^0-9]/g,'');
  showDialog('発送処理を保存',
    '商品NO: '+shipItem.商品NO+'\nステータス: '+shipStatus+'\n発送日: '+soldDate.replace(/-/g,'/')+'\n\n保存しますか？',
    ()=>{
      showLoad('保存中...');
      gasCall('updateShipping',{rowIndex:shipItem.rowIndex,ステータス:shipStatus,販売済日:soldDate.replace(/-/g,'/'),販売金額:sellPrice?Number(sellPrice):undefined},
        res=>{hideLoad();if(res&&res.ok){showToast('✅ 保存しました');clearShip();}else showToast('⚠️ 保存に失敗しました','err');},
        ()=>{hideLoad();showToast('⚠️ 通信エラー','err');});
    },null);
}
function clearShip(){
  shipItem=null;shipStatus='';
  document.getElementById('ship-empty').style.display='block';
  document.getElementById('ship-detail').style.display='none';
  document.getElementById('search-input').value='';
}

// ── TAB2 一括編集 ──
function addBulkItem(item){
  if(bulkItems.find(b=>b.識別ID===item.識別ID)){showToast('⚠️ すでに追加済みです','err');return;}
  bulkItems.push(item);renderBulkList();showToast('✅ '+(item.商品名||item.バーコード)+' を追加');
}
function renderBulkList(){
  const listEl=document.getElementById('bulk-list');
  document.getElementById('bulk-count').textContent=bulkItems.length+'件 スキャン済み';
  document.getElementById('bulk-form').style.display=bulkItems.length>0?'block':'none';
  listEl.innerHTML='';
  bulkItems.forEach((item,idx)=>{
    const d=document.createElement('div');d.className='bulk-item';
    d.innerHTML=`<div class="bulk-item-no">${idx+1}</div><div class="bulk-item-info"><div class="bulk-item-name">${item.商品名||'（商品名不明）'}</div><div class="bulk-item-sub">BC: ${item.バーコード} ／ ${item.ステータス||'-'}</div></div><button class="bulk-item-del" onclick="removeBulkItem(${idx})">✕</button>`;
    listEl.appendChild(d);
  });
  buildStatusChips('bulk-status-chips',ALL_STATUSES,()=>bulkStatus,s=>{bulkStatus=s;});
}
function removeBulkItem(idx){bulkItems.splice(idx,1);renderBulkList();}
function saveBulk(){
  if(bulkItems.length===0){showToast('⚠️ 商品をスキャンしてください','err');return;}
  const soldDate=document.getElementById('bulk-sold-date').value,buyDate=document.getElementById('bulk-buy-date').value;
  const sellPrice=document.getElementById('bulk-sell-price').value.replace(/[^0-9]/g,''),buyPrice=document.getElementById('bulk-buy-price').value.replace(/[^0-9]/g,'');
  showDialog('一括保存の確認',bulkItems.length+'件をまとめて保存します\nよろしいですか？',
    ()=>{
      showLoad('一括保存中...');
      const items=bulkItems.map(item=>{
        const p={rowIndex:item.rowIndex};
        if(bulkStatus)p.ステータス=bulkStatus;if(bulkShipMethod)p.発送手段=bulkShipMethod;
        if(soldDate)p.販売済日=soldDate.replace(/-/g,'/');if(buyDate)p.購入日=buyDate.replace(/-/g,'/');
        if(sellPrice)p.販売金額=Number(sellPrice);if(buyPrice)p.購入金額=Number(buyPrice);
        if(bulkShop)p.店名=bulkShop;if(bulkNameId)p.商品名ID=bulkNameId;
        return p;
      });
      gasCall('bulkUpdate',{items:items},
        res=>{hideLoad();if(res&&res.ok){showToast('✅ '+res.updated+'件 保存しました');clearBulk();}else showToast('⚠️ 保存に失敗しました','err');},
        ()=>{hideLoad();showToast('⚠️ 通信エラー','err');});
    },null);
}
function clearBulk(){
  bulkItems=[];bulkStatus='';bulkShipMethod='';bulkShop='';bulkNameId='';bulkNameLabel='';
  ['bulk-sold-date','bulk-buy-date','bulk-sell-price','bulk-buy-price'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bulk-ship-method-val').textContent='選択してください';
  document.getElementById('bulk-shop-val').textContent='選択してください';
  document.getElementById('bulk-name-val').textContent='選択してください';
  renderBulkList();
}

// ── 初期化 ──
function loadMasters(){
  showLoad('データ読み込み中...');
  gasCall('getMasters',{},res=>{
    hideLoad();if(res&&res.ok)masters=res;
    buildStatusChips('ship-status-chips',SHIP_STATUSES,()=>shipStatus,s=>{shipStatus=s;});
    buildStatusChips('bulk-status-chips',ALL_STATUSES,()=>bulkStatus,s=>{bulkStatus=s;});
  },()=>{hideLoad();showToast('⚠️ マスタ読み込みエラー','err');});
}
loadMasters();
</script>
