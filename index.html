<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>診療記録</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#8CABD0; --green:#6DBF72;
  --chip-sel:#2D3A4A; --chip-off:#A8C5E0;
  --record-btn:#D164A4; --reserve-btn:#1A237E; --save-btn:#1D4ED8;
  --home-red:#A61D24; --tab-bg:#1A2332;
  --teal:#26C6DA; --detail-bg:#4BBBC6;
  --text:#1A2332; --white:#fff;
}
body {
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg); width:375px; height:667px;
  overflow:hidden; position:relative; margin:0 auto;
}
*::-webkit-scrollbar { display:none; }

/* ===== TAB BAR ===== */
.tab-bar {
  position:absolute; bottom:0; left:0; right:0; height:60px;
  background:var(--tab-bg); display:flex; z-index:100;
}
.tab-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; cursor:pointer; color:#556;
  font-size:11px; border:none; background:none; transition:color .2s;
}
.tab-btn.active { color:var(--white); }
.tab-icon { font-size:22px; }

/* ===== SCREENS ===== */
.screen {
  position:absolute; top:0; left:0; right:0; bottom:60px;
  overflow-y:auto; overflow-x:hidden; display:none;
  padding:12px; padding-bottom:16px;
}
.screen.active { display:block; }

/* ===== LOADING OVERLAY ===== */
.loading-ov {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.55); z-index:500;
  justify-content:center; align-items:center;
  flex-direction:column; gap:14px; width:375px; margin:0 auto;
}
.loading-ov.show { display:flex; }
.loading-spinner {
  width:48px; height:48px; border:5px solid rgba(255,255,255,.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-msg { color:#fff; font-size:14px; font-weight:700; }

/* ===== RECORD SCREEN ===== */
.appt-box {
  background:var(--white); border:3px solid var(--home-red);
  border-radius:16px; padding:12px 16px; margin-bottom:12px; text-align:center;
}
.appt-label { font-size:12px; color:#888; margin-bottom:4px; }
.appt-value { font-size:16px; font-weight:900; color:var(--home-red); line-height:1.5; }
.sec-label {
  text-align:center; font-size:12px; color:var(--text);
  margin:8px 0 6px; font-weight:600; opacity:.65;
}
.g-card { background:var(--green); border-radius:14px; padding:12px 14px; margin-bottom:8px; }
.g-row { display:flex; gap:8px; }
.g-half { flex:1; background:var(--green); border-radius:14px; padding:10px 12px; margin-bottom:8px; }
.g-lbl { font-size:11px; color:rgba(0,0,0,.55); margin-bottom:5px; text-align:center; }

/* 診察日 */
.date-field { background:var(--green); border-radius:14px; padding:12px 14px; margin-bottom:8px; text-align:center; }
.date-val { font-size:17px; font-weight:700; color:var(--text); display:flex; align-items:center; justify-content:center; gap:8px; }
.date-native {
  position:relative; display:inline-flex; align-items:center;
  background:rgba(255,255,255,.4); border-radius:10px; padding:4px 10px; cursor:pointer;
}
.date-native input[type="date"] {
  border:none; background:transparent; font-size:15px; font-weight:700;
  font-family:inherit; color:var(--text); outline:none; cursor:pointer; width:160px;
}
.date-native input[type="date"]::-webkit-calendar-picker-indicator { cursor:pointer; font-size:18px; }

/* CHIPS */
.chip-grp { display:flex; gap:6px; }
.chip {
  flex:1; padding:8px 4px; border-radius:20px; border:none; cursor:pointer;
  font-size:14px; font-weight:700; background:var(--chip-off); color:var(--text); transition:all .15s;
}
.chip.sel { background:var(--chip-sel); color:var(--white); }
.chip4 { font-size:13px; }

/* SELECTORS */
.sel-tap {
  background:rgba(255,255,255,.4); border-radius:20px; padding:8px 14px;
  color:var(--text); font-weight:600; font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; width:100%; border:none; text-align:left;
}

/* 金額入力 */
.fee-wrap {
  display:flex; align-items:center;
  background:rgba(255,255,255,.5); border-radius:10px; overflow:hidden;
}
.fee-yen { padding:10px 6px 10px 12px; font-size:16px; font-weight:700; color:var(--text); flex-shrink:0; user-select:none; }
.fee-inp {
  flex:1; border:none; background:transparent; padding:10px 8px;
  font-size:15px; font-family:inherit; color:var(--text); outline:none; width:0;
}
.total-box {
  background:rgba(255,255,255,.55); border-radius:14px; padding:10px 14px; margin-bottom:8px;
}
.total-top { font-size:11px; color:rgba(0,0,0,.5); font-weight:600; }
.total-sub { font-size:10px; color:rgba(0,0,0,.4); }
.total-val { font-size:20px; font-weight:900; color:#C0392B; text-align:right; }
.drug-stepper {
  display:flex; align-items:center; justify-content:center; gap:14px;
  background:rgba(255,255,255,.4); border-radius:10px; padding:8px;
}
.stepper-btn {
  width:32px; height:32px; border-radius:50%; border:none; cursor:pointer;
  font-size:20px; font-weight:900; background:var(--chip-sel); color:var(--white);
  display:flex; align-items:center; justify-content:center; transition:opacity .15s;
}
.stepper-btn:active { opacity:.7; }
.stepper-val { font-size:18px; font-weight:800; color:var(--text); min-width:28px; text-align:center; }
.n-input {
  background:rgba(255,255,255,.5); border:none; border-radius:10px;
  padding:10px 12px; width:100%; font-size:15px; font-family:inherit; color:var(--text); outline:none;
}

/* ⑧ 画像添付ボタン（診察代金・薬料金ラベル付き） */
.img-btn {
  flex:1; background:rgba(255,255,255,.3); border:2px dashed rgba(0,0,0,.2);
  border-radius:10px; padding:14px 8px; cursor:pointer; text-align:center;
  font-size:20px; color:rgba(0,0,0,.35); transition:background .15s; position:relative;
}
.img-btn .img-hint { font-size:10px; display:block; margin-top:4px; color:rgba(0,0,0,.5); font-weight:600; }
.img-upload-progress {
  position:absolute; bottom:4px; left:4px; right:4px; height:3px;
  background:rgba(0,0,0,.1); border-radius:2px; overflow:hidden; display:none;
}
.img-upload-progress.show { display:block; }
.img-upload-bar { height:100%; background:var(--save-btn); width:0; transition:width .3s; }

.big-btn {
  width:100%; padding:14px; border-radius:14px; border:none; cursor:pointer;
  font-size:15px; font-weight:800; color:var(--white); margin-bottom:8px; transition:opacity .2s;
}
.big-btn:active { opacity:.8; }
.btn-rec { background:var(--record-btn); }
.btn-res { background:var(--reserve-btn); }
.fee-sec { text-align:center; font-size:12px; color:rgba(0,0,0,.45); margin:4px 0 6px; }

/* ===== HISTORY SCREEN ===== */
.h-tabs {
  display:flex; background:rgba(255,255,255,.15); border-radius:12px; padding:4px; margin-bottom:12px;
}
.htab {
  flex:1; padding:8px; border-radius:9px; border:none; cursor:pointer;
  font-size:12px; font-weight:700; background:transparent; color:rgba(255,255,255,.55); transition:all .2s;
}
.htab.active { background:var(--save-btn); color:var(--white); }

.breadcrumb {
  font-size:12px; color:rgba(255,255,255,.65); margin-bottom:10px;
  display:flex; align-items:center; gap:3px; flex-wrap:wrap;
}
.bc-link { color:var(--white); font-weight:700; cursor:pointer; text-decoration:underline; }
.bc-sep { opacity:.5; }

/* ② 年カード - コンパクトサイズ */
.yr-card {
  background:rgba(255,255,255,.2); border-radius:10px;
  padding:7px 12px; margin-bottom:5px; cursor:pointer; transition:background .15s;
  display:flex; align-items:center; justify-content:space-between;
}
.yr-card:active { background:rgba(255,255,255,.32); }
.yr-title { font-size:13px; font-weight:800; color:var(--white); }
.yr-sub { font-size:12px; color:rgba(255,255,255,.65); }

/* month grid */
.mo-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
.mo-cell { background:rgba(255,255,255,.12); border-radius:12px; padding:10px 4px; text-align:center; cursor:default; transition:background .15s; }
.mo-cell.has-data { background:rgba(255,255,255,.25); cursor:pointer; }
.mo-cell.has-data:active { background:rgba(255,255,255,.38); }
.mo-name { font-size:14px; color:rgba(255,255,255,.35); }
.mo-cell.has-data .mo-name { font-weight:800; color:var(--white); }
.mo-info { font-size:10px; color:rgba(255,255,255,.55); margin-top:2px; }

.day-group { margin-bottom:10px; }
.day-header {
  font-size:14px; font-weight:800; color:var(--white); margin-bottom:6px;
  padding:6px 10px; background:rgba(0,0,0,.15); border-radius:10px;
}
.rec-item {
  background:var(--green); border-radius:14px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:opacity .15s;
}
.rec-item:active { opacity:.75; }
.rec-head { display:flex; justify-content:space-between; margin-bottom:3px; }
.rec-date { font-size:13px; font-weight:700; color:var(--text); }
.rec-amt { font-size:14px; font-weight:700; color:var(--text); }
.rec-hosp { font-size:13px; color:rgba(0,0,0,.65); margin-bottom:5px; }
.badge-row { display:flex; gap:4px; flex-wrap:wrap; }
.badge { padding:2px 7px; border-radius:10px; font-size:11px; font-weight:700; border:1.5px solid rgba(0,0,0,.12); }
.b-mr { background:#B3E5FC; color:#01579B; }
.b-ct { background:#C8E6C9; color:#1B5E20; }
.b-xp { background:#FFF9C4; color:#F57F17; }
.b-blood { background:#FCE4EC; color:#880E4F; }
.b-add { background:#fff; color:#333; }
.b-med { background:#1565C0; color:#fff; }
.b-diag { background:#E65100; color:#fff; }

/* summary bar */
.sum-bar {
  position:sticky; bottom:0; background:var(--tab-bg); border-radius:14px 14px 0 0;
  padding:12px 16px; display:flex; justify-content:space-around; margin:0 -12px -16px;
}
.sum-cell { text-align:center; }
.sum-lbl { font-size:10px; color:rgba(255,255,255,.5); }
.sum-val { font-size:13px; font-weight:800; color:#FFD700; margin-top:2px; }

.pdf-btn {
  width:100%; padding:12px; border:2px solid #FFD700; border-radius:12px;
  background:transparent; color:#FFD700; font-size:14px; font-weight:700;
  cursor:pointer; margin-bottom:10px; transition:background .15s;
}
.pdf-btn:active { background:rgba(255,215,0,.1); }

.dept-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.dept-card {
  background:rgba(255,255,255,.18); border-radius:14px; padding:14px 8px;
  text-align:center; cursor:pointer; transition:background .15s;
}
.dept-card:active { background:rgba(255,255,255,.3); }
.dept-nm { font-size:13px; font-weight:700; color:var(--white); }
.dept-cnt { font-size:11px; color:rgba(255,255,255,.5); margin-top:2px; }
.hosp-pill {
  display:inline-block; background:rgba(255,255,255,.2); border-radius:14px;
  padding:12px 16px; margin:0 6px 8px 0; font-size:14px; font-weight:700;
  color:var(--white); cursor:pointer; transition:background .15s;
}
.hosp-pill:active { background:rgba(255,255,255,.35); }

.today-lbl {
  text-align:center; font-size:14px; font-weight:800; color:#FFD700;
  padding:6px; border-radius:8px; background:rgba(255,215,0,.1); margin-bottom:10px;
}
.res-item {
  border-radius:12px; padding:12px 14px; margin-bottom:8px; cursor:pointer;
  transition:opacity .15s; display:flex; align-items:center; gap:10px;
}
.res-item:active { opacity:.75; }
.res-item.has-detail { background:var(--white); }
.res-item.no-detail { background:#8a8a8a; cursor:default; }
.res-item.no-detail:active { opacity:1; }
.res-icon { font-size:18px; flex-shrink:0; }
.res-body { flex:1; }
.res-dt { font-size:14px; font-weight:700; }
.res-item.has-detail .res-dt { color:var(--text); }
.res-item.no-detail .res-dt { color:#ddd; }
.res-hp { font-size:12px; margin-top:3px; }
.res-item.has-detail .res-hp { color:#666; }
.res-item.no-detail .res-hp { color:#bbb; }
.add-res-btn {
  width:100%; padding:13px; border-radius:12px; border:2px solid var(--teal);
  background:transparent; color:var(--teal); font-size:14px; font-weight:700;
  cursor:pointer; margin-bottom:8px;
}
.show-past-btn {
  width:100%; padding:13px; border-radius:12px; border:2px solid var(--record-btn);
  background:transparent; color:var(--record-btn); font-size:14px; font-weight:700; cursor:pointer;
}

/* ===== DETAIL SCREEN ===== */
.detail-screen {
  display:none; position:absolute; top:0; left:0; right:0; bottom:60px;
  background:var(--detail-bg); overflow-y:auto; z-index:50;
}
.detail-screen.open { display:block; }
.detail-hdr {
  background:var(--teal); padding:14px 16px; display:flex;
  align-items:center; gap:12px; position:sticky; top:0; z-index:10;
}
.detail-back { background:none; border:none; color:var(--white); font-size:15px; font-weight:700; cursor:pointer; }
.detail-badge {
  background:rgba(255,255,255,.2); border-radius:20px; padding:4px 12px;
  font-size:13px; font-weight:700; color:var(--white);
}
.d-card { background:var(--white); border-radius:14px; padding:14px 16px; margin:8px 12px; }
.d-lbl { font-size:12px; color:#888; text-align:center; margin-bottom:4px; }
.d-val { font-size:18px; font-weight:700; color:var(--text); text-align:center; }
.fee-card { background:var(--tab-bg); border-radius:14px; padding:16px; margin:8px 12px; }
.fee-row { display:flex; justify-content:space-between; margin-bottom:8px; color:rgba(255,255,255,.7); font-size:14px; }
.fee-total { display:flex; justify-content:space-between; padding-top:10px; border-top:1px solid rgba(255,255,255,.15); font-size:16px; font-weight:800; color:var(--white); }
.fee-total-v { color:#FFD700; }
.d-actions { display:flex; gap:8px; padding:12px; }
.act-btn { flex:1; padding:12px; border-radius:12px; border:none; cursor:pointer; font-size:14px; font-weight:700; color:var(--white); transition:opacity .15s; }
.act-btn:active { opacity:.8; }
.btn-edit { background:var(--save-btn); }
.btn-del { background:#E53935; }
.btn-copy { background:#455A64; }

/* ===== MODAL ===== */
/* ① 予約モーダルより上になるよう z-index を分離 */
.modal-ov {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.6); justify-content:center;
  align-items:flex-end; width:375px; margin:0 auto;
}
.modal-ov.open { display:flex; }
/* リストモーダルは常に最前面 */
#modal-list { z-index:400; }
/* 予約モーダルはその下 */
#modal-reserve { z-index:300; }

.modal-sheet {
  background:#1A2332; border-radius:20px 20px 0 0; width:100%;
  padding:20px 16px 36px; max-height:80vh; overflow-y:auto;
}
.modal-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-title { font-size:16px; font-weight:800; color:var(--white); }
.modal-x { background:none; border:none; color:#888; font-size:20px; cursor:pointer; }
.modal-item {
  padding:16px 12px; border-bottom:1px solid rgba(255,255,255,.07);
  color:var(--white); font-size:15px; cursor:pointer; border-radius:8px; transition:background .12s;
}
.modal-item:active { background:rgba(255,255,255,.1); }
.modal-add { padding:16px 12px; color:var(--teal); font-size:15px; font-weight:700; cursor:pointer; }
.f-grp { margin-bottom:14px; }
.f-lbl { font-size:12px; color:rgba(255,255,255,.5); margin-bottom:6px; }
.f-inp {
  width:100%; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  border-radius:10px; padding:12px; color:var(--white); font-size:15px; font-family:inherit; outline:none;
}
.f-inp::placeholder { color:rgba(255,255,255,.3); }
.f-sel-btn {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  border-radius:10px; padding:12px; color:var(--white); font-size:15px;
  width:100%; text-align:left; cursor:pointer; display:flex; align-items:center; justify-content:space-between;
}

/* TOAST */
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-90px);
  background:#2E7D32; color:var(--white); padding:12px 24px; border-radius:20px;
  font-weight:700; font-size:14px; z-index:600; transition:transform .3s; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.error { background:#C62828; }
.toast.info  { background:#1565C0; }

/* ===== EDIT SCREEN ===== */
.edit-screen {
  display:none; position:absolute; top:0; left:0; right:0; bottom:60px;
  background:#1A2332; overflow-y:auto; z-index:80;
}
.edit-screen.open { display:block; }
.edit-hdr {
  background:#243044; padding:14px 16px; display:flex;
  align-items:center; gap:12px; position:sticky; top:0; z-index:10;
}
.edit-hdr-title { font-size:16px; font-weight:800; color:var(--white); flex:1; }
.edit-body { padding:16px; }
.edit-sec { margin-bottom:16px; }
.edit-sec-lbl { font-size:12px; color:rgba(255,255,255,.5); margin-bottom:8px; }
.edit-chip-grp { display:flex; gap:6px; }
.edit-chip {
  flex:1; padding:9px 4px; border-radius:20px; border:none; cursor:pointer;
  font-size:13px; font-weight:700; background:rgba(255,255,255,.12); color:rgba(255,255,255,.6); transition:all .15s;
}
.edit-chip.sel { background:#1D4ED8; color:var(--white); }
.edit-inp {
  width:100%; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  border-radius:10px; padding:12px; color:var(--white); font-size:15px; font-family:inherit; outline:none;
}
.edit-sel-btn {
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
  border-radius:10px; padding:12px; color:var(--white); font-size:15px;
  width:100%; text-align:left; cursor:pointer; display:flex; align-items:center; justify-content:space-between;
}
.edit-fee-wrap {
  display:flex; align-items:center;
  background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); border-radius:10px; overflow:hidden;
}
.edit-fee-yen { padding:12px 6px 12px 12px; font-size:16px; font-weight:700; color:rgba(255,255,255,.7); flex-shrink:0; }
.edit-fee-inp {
  flex:1; border:none; background:transparent; padding:12px 8px;
  font-size:15px; font-family:inherit; color:var(--white); outline:none; width:0;
}
</style>
</head>
<body>

<!-- ローディングオーバーレイ -->
<div class="loading-ov" id="loading-ov">
  <div class="loading-spinner"></div>
  <div class="loading-msg" id="loading-msg">読み込み中...</div>
</div>

<div class="toast" id="toast"></div>

<!-- ========== RECORD SCREEN ========== -->
<div class="screen active" id="screen-record">
  <div class="appt-box">
    <div class="appt-label">次回予約</div>
    <div class="appt-value" id="next-appt">予約なし</div>
  </div>

  <div class="sec-label">基本情報</div>

  <div class="date-field">
    <div class="g-lbl">📅 診察日（必須）</div>
    <div class="date-val">
      <div class="date-native">
        <input type="date" id="dp">
      </div>
    </div>
  </div>

  <div class="g-row">
    <div class="g-half">
      <div class="g-lbl">🏥 病院名（必須）</div>
      <button class="sel-tap" onclick="openListModal('hospital')">
        <span id="sel-hosp">選択</span><span>▼</span>
      </button>
    </div>
    <div class="g-half">
      <div class="g-lbl">✏️ 科目（必須）</div>
      <button class="sel-tap" onclick="openListModal('dept')">
        <span id="sel-dept">選択</span><span>▼</span>
      </button>
    </div>
  </div>

  <div class="g-card">
    <div class="g-lbl">📞 診察</div>
    <div class="chip-grp">
      <button class="chip" id="c-exam-n" onclick="setChip('exam','n')">なし</button>
      <button class="chip sel" id="c-exam-y" onclick="setChip('exam','y')">あり</button>
    </div>
  </div>
  <div class="g-card">
    <div class="g-lbl">🩻 画像検査</div>
    <div class="chip-grp">
      <button class="chip chip4 sel" id="c-img-0" onclick="setChip('img','0')">無</button>

<script>
// ══════════════════════════════════════════════════════
// GAS環境判定
// ══════════════════════════════════════════════════════
const IS_GAS = typeof google !== 'undefined' && google.script && google.script.run;

// GAS呼び出しラッパー
function gasCall(fnName, payload, onSuccess, onError) {
  if (!IS_GAS) {
    console.warn('[gasCall] GAS環境外 - ローカル動作のみ');
    if (onSuccess) onSuccess({ ok: true, local: true });
    return;
  }
  google.script.run
    .withSuccessHandler(res => { if (onSuccess) onSuccess(res); })
    .withFailureHandler(err => {
      const msg = err.message || String(err);
      console.error('[GASエラー]', fnName, msg);
      if (onError) onError(msg);
      else showToast('⚠️ GASエラー: ' + msg, 'error');
    })
    [fnName](payload);
}

// ══════════════════════════════════════════════════════
// ④ データ：テストデータ撤廃→GASから読み込み
// ══════════════════════════════════════════════════════
let hospitals = [];  // GAS getMasters() で初期化
let depts     = [];  // GAS getMasters() で初期化
let records   = [];  // GAS getRecords()  で初期化
let reserves  = [];  // GAS getReserves() で初期化

// UI State
const S = { exam:'y', img:'0', blood:'n', add:'n', hosp:'', dept:'', rvHostp:'', rvDept:'' };
let modalTarget   = '';
let detailReturnFn = null;
let editId        = null;
let editMode      = 'edit';
let showPast      = false;
let editState     = {};
let drugCount     = 0;
// 画像Base64バッファ（保存時に使用）
let imgData = { 1: null, 2: null };

// ══════════════════════════════════════════════════════
// ローディング制御
// ══════════════════════════════════════════════════════
function showLoading(msg = '読み込み中...') {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-ov').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading-ov').classList.remove('show');
}

// ══════════════════════════════════════════════════════
// ④ アプリ起動時：GASから全データ読み込み
// ══════════════════════════════════════════════════════
function initApp() {
  showLoading('データを読み込み中...');
  let done = 0;
  const total = 3; // masters / records / reserves
  function check() {
    done++;
    if (done >= total) {
      hideLoading();
      setTodayDate();
      updateNextAppt();
      renderHist();
      updateTotal();
    }
  }

  // マスター（病院・科目リスト）
  gasCall('getMasters', {},
    res => {
      if (res && res.ok) {
        hospitals = res.hospitals || [];
        depts     = res.depts     || [];
      }
      check();
    },
    () => check()
  );

  // 診察記録
  gasCall('getRecords', {},
    res => {
      if (res && res.ok) records = res.records || [];
      check();
    },
    () => check()
  );

  // 予約
  gasCall('getReserves', {},
    res => {
      if (res && res.ok) reserves = res.reserves || [];
      check();
    },
    () => check()
  );
}

// ══════════════════════════════════════════════════════
// 金額ユーティリティ
// ══════════════════════════════════════════════════════
function toHankaku(str) {
  return str.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
}
function rawNum(str) {
  return parseInt(toHankaku(String(str)).replace(/,/g,'').replace(/[^0-9]/g,'')) || 0;
}
function fmtComma(n) { return Number(n).toLocaleString('ja-JP'); }
function onFeeInput(el) {
  const raw = toHankaku(el.value).replace(/[^0-9]/g,'');
  el.value = raw ? fmtComma(parseInt(raw)) : '';
  updateTotal();
}
function onFeeBlur(el) {
  const n = rawNum(el.value);
  el.value = n > 0 ? fmtComma(n) : '';
  updateTotal();
}
function updateTotal() {
  const t = rawNum(document.getElementById('f-treat').value);
  const m = rawNum(document.getElementById('f-med').value);
  document.getElementById('total-val').textContent = '¥' + fmtComma(t + m);
  document.getElementById('total-sub').textContent =
    `（診察料金 ¥${fmtComma(t)} ・ 薬料金 ¥${fmtComma(m)}）`;
}
function stepDrug(d) {
  drugCount = Math.max(0, drugCount + d);
  document.getElementById('drug-val').textContent = drugCount;
}

// ══════════════════════════════════════════════════════
// 汎用ユーティリティ
// ══════════════════════════════════════════════════════
const DOW = ['日','月','火','水','木','金','土'];
function getDow(ds) { return DOW[new Date(ds.replace(/\//g,'-')).getDay()]; }
function yen(n) { return '¥' + fmtComma(n); }
function dateLabel(d) { return d + '（' + getDow(d) + '）'; }
function dtLabel(s) {
  const d = new Date(s);
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  const h  = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${d.getFullYear()}/${mo}/${dy}（${DOW[d.getDay()]}）${h}:${mi}`;
}
function badgeHtml(rec) {
  let b = '';
  if (rec.img && rec.img !== '無') b += `<span class="badge b-${rec.img.toLowerCase()}">${rec.img}</span>`;
  if (rec.blood === 'あり')   b += '<span class="badge b-blood">血</span>';
  if (rec.addTest === 'あり') b += '<span class="badge b-add">追</span>';
  if (rec.drug > 0)           b += `<span class="badge b-med">薬${rec.drug}</span>`;
  if (rec.memo)               b += `<span class="badge b-diag">${rec.memo}</span>`;
  return b;
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' '+type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function bgClose(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function mk(tag, cls='') { const e = document.createElement(tag); if(cls) e.className=cls; return e; }

function setTodayDate() {
  const n = new Date();
  const v = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  document.getElementById('dp').value = v;
}

// ══════════════════════════════════════════════════════
// CHIPS
// ══════════════════════════════════════════════════════
function setChip(g, v) {
  S[g] = v;
  if (g === 'exam') {
    document.getElementById('c-exam-n').className = 'chip' + (v==='n'?' sel':'');
    document.getElementById('c-exam-y').className = 'chip' + (v==='y'?' sel':'');
  } else if (g === 'img') {
    ['0','xp','ct','mr'].forEach(x =>
      document.getElementById('c-img-'+x).className = 'chip chip4'+(v===x?' sel':'')
    );
  } else if (g === 'blood') {
    document.getElementById('c-blood-n').className = 'chip'+(v==='n'?' sel':'');
    document.getElementById('c-blood-y').className = 'chip'+(v==='y'?' sel':'');
  } else if (g === 'add') {
    document.getElementById('c-add-n').className = 'chip'+(v==='n'?' sel':'');
    document.getElementById('c-add-y').className = 'chip'+(v==='y'?' sel':'');
  }
}

// ══════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════
function switchTab(t) {
  ['record','history'].forEach(x => {
    document.getElementById('screen-'+x).classList.toggle('active', x===t);
    document.getElementById('tab-'+x).classList.toggle('active', x===t);
  });
  if (t === 'history') renderHist();
}
function switchHTab(t) {
  ['yr','hp','rv'].forEach(x => {
    document.getElementById('ht-'+x).classList.toggle('active', x===t);
    document.getElementById('hview-'+x).style.display = x===t ? 'block' : 'none';
  });
  if (t==='yr') renderYear();
  if (t==='hp') renderHosp();
  if (t==='rv') renderReserve();
}
function renderHist() { renderYear(); renderHosp(); renderReserve(); }

// ══════════════════════════════════════════════════════
// ① リストモーダル（z-index修正済み）
// ⑤ 新規追加時にGAS addMaster を呼び出す
// ══════════════════════════════════════════════════════
function openListModal(target) {
  modalTarget = target;
  const titles = {
    hospital:'🏥 病院名を選択', dept:'✏️ 科目を選択',
    'rv-hosp':'🏥 病院名を選択', 'rv-dept':'✏️ 科目を選択',
    'edit-hosp':'🏥 病院名を選択', 'edit-dept':'✏️ 科目を選択'
  };
  document.getElementById('ml-title').textContent = titles[target] || '選択';
  const isDept = ['dept','rv-dept','edit-dept'].includes(target);
  const list   = isDept ? depts : hospitals;
  const items  = document.getElementById('ml-items');
  items.innerHTML = '';

  list.forEach(item => {
    const d = mk('div','modal-item'); d.textContent = item;
    d.onclick = () => { setListVal(target, item); closeModal('modal-list'); };
    items.appendChild(d);
  });

  // ⑤ 新規追加→GAS masterシートに同期
  const add = mk('div','modal-add'); add.textContent = '＋ 新規追加';
  add.onclick = () => {
    const v = prompt(isDept ? '新しい科目を入力：' : '新しい病院名を入力：');
    if (!v || !v.trim()) return;
    const val = v.trim();
    if (isDept) { if (!depts.includes(val)) depts.push(val); }
    else        { if (!hospitals.includes(val)) hospitals.push(val); }
    // ⑤ GAS masterシートへ保存
    gasCall('addMaster', { type: isDept ? 'dept' : 'hospital', value: val },
      res => {
        if (res && res.ok) showToast('✅ マスターに追加しました');
        else showToast('⚠️ マスター保存エラー', 'error');
      }
    );
    setListVal(target, val);
    closeModal('modal-list');
  };
  items.appendChild(add);
  openModal('modal-list');
}

function setListVal(target, val) {
  if      (target==='hospital')  { S.hosp=val;    document.getElementById('sel-hosp').textContent=val; }
  else if (target==='dept')      { S.dept=val;    document.getElementById('sel-dept').textContent=val; }
  else if (target==='rv-hosp')   { S.rvHostp=val; document.getElementById('rv-hosp-txt').textContent=val; }
  else if (target==='rv-dept')   { S.rvDept=val;  document.getElementById('rv-dept-txt').textContent=val; }
  else if (target==='edit-hosp') {
    editState.hosp = val;
    const b = document.getElementById('edit-hosp-btn');
    if (b) b.querySelector('span').textContent = val;
  }
  else if (target==='edit-dept') {
    editState.dept = val;
    const b = document.getElementById('edit-dept-btn');
    if (b) b.querySelector('span').textContent = val;
  }
}

// ══════════════════════════════════════════════════════
// ⑧ 画像処理：Canvas圧縮 → Base64
// ══════════════════════════════════════════════════════
function handleImageSelect(input, num) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const lbl  = document.getElementById('img' + num + '-lbl');
  const prog = document.getElementById('img' + num + '-prog');
  const bar  = document.getElementById('img' + num + '-bar');

  lbl.innerHTML = `⏳<span class="img-hint">処理中...</span>
    <div class="img-upload-progress show" id="img${num}-prog">
      <div class="img-upload-bar" id="img${num}-bar" style="width:30%"></div>
    </div>`;

  const reader = new FileReader();
  reader.onload = function(e) {
    const origData = e.target.result;
    const prog2 = document.getElementById('img' + num + '-prog');
    const bar2  = document.getElementById('img' + num + '-bar');
    if (bar2) bar2.style.width = '60%';

    // Canvas APIでリサイズ + JPEG変換
    const img = new Image();
    img.onload = function() {
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
        else        { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      // JPEG 70% 圧縮
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      // Base64部分のみ抽出（先頭のdata:image/jpeg;base64,を除去）
      imgData[num] = {
        base64:    compressed.split(',')[1],
        mimeType:  'image/jpeg',
        origName:  file.name,
      };
      if (bar2) bar2.style.width = '100%';
      setTimeout(() => {
        lbl.innerHTML = `✅<span class="img-hint">${num===1?'診察代金':'薬料金'}</span>`;
        lbl.style.background = 'rgba(109,191,114,.4)';
      }, 300);
    };
    img.onerror = function() {
      showToast('⚠️ 画像の読み込みに失敗しました', 'error');
      lbl.innerHTML = `📷<span class="img-hint">${num===1?'診察代金':'薬料金'}</span>`;
      lbl.style.background = '';
    };
    img.src = origData;
  };
  reader.onerror = function() {
    showToast('⚠️ ファイル読み込みエラー', 'error');
  };
  reader.readAsDataURL(file);
}

// GASへ画像をアップロード
function uploadImage(num, recordId, dateStr, hospName) {
  if (!imgData[num]) return;
  const typeLabel = num === 1 ? '診察代金' : '薬料金';
  // ⑧ ファイル名規則: 2026/03/05-○○病院-診察代金
  const fname = `${dateStr}-${hospName}-${typeLabel}`;
  showLoading(`画像${num}をアップロード中...`);
  gasCall('saveImageToDrive',
    {
      base64:    imgData[num].base64,
      mimeType:  imgData[num].mimeType,
      name:      fname + '.jpg',
      recordId:  String(recordId),
      imgNum:    num,
    },
    res => {
      hideLoading();
      if (res && res.ok) {
        showToast(`✅ 画像${num}（${typeLabel}）を保存しました`, 'info');
        // 残りの画像をアップロード
        if (num === 1 && imgData[2]) uploadImage(2, recordId, dateStr, hospName);
      } else {
        showToast(`⚠️ 画像${num}の保存失敗: ${res ? res.error : '不明'}`, 'error');
        console.error('[画像アップロードエラー]', res);
      }
    },
    errMsg => {
      hideLoading();
      if (errMsg && errMsg.includes('timeout')) {
        showToast('⚠️ 通信タイムアウト - 再試行してください', 'error');
        console.error('[タイムアウトエラー]', errMsg);
      } else {
        showToast('⚠️ GASエラー: ' + errMsg, 'error');
        console.error('[GASエラー]', errMsg);
      }
    }
  );
}

// 記録保存
// ══════════════════════════════════════════════════════
function saveRecord() {
  const dv = document.getElementById('dp').value;
  if (!dv)     { alert('診察日を入力してください'); return; }
  if (!S.hosp) { alert('病院名を選択してください'); return; }
  if (!S.dept) { alert('科目を選択してください'); return; }

  const d  = new Date(dv);
  const ds = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  const imgMap = {0:'無', xp:'XP', ct:'CT', mr:'MR'};

  const treatNum = rawNum(document.getElementById('f-treat').value);
  const medNum   = rawNum(document.getElementById('f-med').value);
  const memo     = document.getElementById('f-memo').value.slice(0, 8);

  const rec = {
    id: Date.now(),
    date: ds, dow: getDow(ds),
    hosp: S.hosp, dept: S.dept,
    exam:    S.exam  === 'y' ? 'あり' : 'なし',
    img:     imgMap[S.img] || '無',
    blood:   S.blood === 'y' ? 'あり' : 'なし',
    addTest: S.add   === 'y' ? 'あり' : 'なし',
    drug:  drugCount,
    treat: treatNum,
    med:   medNum,
    memo:  memo,
  };

  showLoading('保存中...');
  gasCall('saveRecord', rec,
    res => {
      hideLoading();
      if (res && res.ok === false) {
        showToast('⚠️ 保存エラー: ' + res.error, 'error');
        return;
      }
      // ④ ローカルにも追加（再起動まで画面に反映）
      records.unshift(rec);
      showToast('✅ 保存しました');
      // ⑧ 画像があればアップロード
      if (imgData[1] || imgData[2]) {
        if (imgData[1]) uploadImage(1, rec.id, ds, S.hosp);
        else if (imgData[2]) uploadImage(2, rec.id, ds, S.hosp);
      }
      resetForm();
      setTimeout(() => switchTab('history'), 500);
    },
    errMsg => {
      hideLoading();
      showToast('⚠️ 保存エラー: ' + errMsg, 'error');
    }
  );
}

function resetForm() {
  document.getElementById('f-treat').value = '';
  document.getElementById('f-med').value   = '';
  document.getElementById('f-memo').value  = '';
  drugCount = 0;
  document.getElementById('drug-val').textContent = '0';
  updateTotal();
  S.hosp = ''; S.dept = '';
  document.getElementById('sel-hosp').textContent = '選択';
  document.getElementById('sel-dept').textContent = '選択';
  setChip('exam','y'); setChip('img','0'); setChip('blood','n'); setChip('add','n');
  imgData = {1:null, 2:null};
  // 画像ボタンリセット
  [1,2].forEach(n => {
    const lbl = document.getElementById('img'+n+'-lbl');
    lbl.style.background = '';
    lbl.innerHTML = `📷<span class="img-hint">${n===1?'診察代金':'薬料金'}</span>
      <div class="img-upload-progress" id="img${n}-prog"><div class="img-upload-bar" id="img${n}-bar"></div></div>`;
  });
  setTodayDate();
}

function openReserveModal() { openModal('modal-reserve'); }
function saveReserve() {
  const dt = document.getElementById('rv-dt').value;
  if (!dt)        { alert('予約日時を入力してください'); return; }
  if (!S.rvHostp) { alert('病院名を選択してください'); return; }
  const r = { id: Date.now(), dt, hosp: S.rvHostp, dept: S.rvDept || '' };
  showLoading('予約を保存中...');
  gasCall('saveReserve', r,
    res => {
      hideLoading();
      if (res && res.ok === false) { showToast('⚠️ 予約保存エラー', 'error'); return; }
      reserves.push(r);
      closeModal('modal-reserve');
      showToast('✅ 予約を保存しました');
      updateNextAppt(); renderReserve();
    },
    () => hideLoading()
  );
}

function updateNextAppt() {
  const now = new Date();
  const fut = reserves.filter(r => new Date(r.dt) > now).sort((a,b) => new Date(a.dt)-new Date(b.dt));
  const el = document.getElementById('next-appt');
  if (!fut.length) { el.textContent='予約なし'; el.style.fontSize='20px'; }
  else {
    const r = fut[0];
    el.innerHTML = `${dtLabel(r.dt)}<br>${r.hosp} / ${r.dept}`;
    el.style.fontSize = '14px';
  }
}

// ② 年別ビュー
// ⑦ PDF月フィルタ：ゼロ埋め統一
// ══════════════════════════════════════════════════════
// ⑦ month を必ず2桁ゼロ埋めに統一する関数
function padMonth(m) { return m ? String(m).padStart(2,'0') : null; }

function renderYear(year=null, month=null) {
  const c = document.getElementById('hview-yr'); c.innerHTML = '';
  const mo = padMonth(month); // ⑦ ゼロ埋め統一

  if (!year) {
    appendBreadcrumb(c, [{label:'📊 年別'}]);
    const yrs = [...new Set(records.map(r=>r.date.split('/')[0]))].sort().reverse();
    if (!yrs.length) { const e=mk('div'); e.style.cssText='color:rgba(255,255,255,.5);padding:20px;text-align:center'; e.textContent='記録がありません'; c.appendChild(e); return; }
    yrs.forEach(y => {
      const recs = records.filter(r=>r.date.startsWith(y));
      const tot  = recs.reduce((s,r)=>s+r.treat+r.med,0);
      // ② コンパクトカード
      const d = mk('div','yr-card');
      d.innerHTML = `<span class="yr-title">${y}年</span><span class="yr-sub">${yen(tot)} / ${recs.length}回</span>`;
      d.onclick = () => renderYear(y);
      c.appendChild(d);
    });
  } else if (!mo) {
    appendBreadcrumb(c, [{label:'📊 年別',fn:()=>renderYear()},{label:year+'年'}]);
    const allRecs = records.filter(r=>r.date.startsWith(year));
    const totT = allRecs.reduce((s,r)=>s+r.treat,0), totM = allRecs.reduce((s,r)=>s+r.med,0);
    const grid = mk('div','mo-grid');
    ['01','02','03','04','05','06','07','08','09','10','11','12'].forEach(m => {
      const recs = records.filter(r=>r.date.startsWith(year+'/'+m));
      const tot  = recs.reduce((s,r)=>s+r.treat+r.med,0);
      const cell = mk('div','mo-cell'+(recs.length?' has-data':''));
      cell.innerHTML = `<div class="mo-name">${m}月</div>${recs.length?`<div class="mo-info">${yen(tot)}<br>${recs.length}回</div>`:''}`;
      if (recs.length) cell.onclick = () => renderYear(year, m); // mは既に2桁
      grid.appendChild(cell);
    });
    c.appendChild(grid);
    const pb = mk('button','pdf-btn'); pb.textContent = '🖨 PDF生成（印刷）';
    pb.onclick = () => doPdf(null, year, null); c.appendChild(pb);
    appendSummaryBar(c, totT, totM, allRecs.length);
  } else {
    appendBreadcrumb(c, [
      {label:'📊 年別',fn:()=>renderYear()},
      {label:year+'年',fn:()=>renderYear(year)},
      {label:mo+'月'}
    ]);
    // ⑦ ゼロ埋めしたmoで正しくフィルタ
    const monthRecs = records.filter(r=>r.date.startsWith(year+'/'+mo));
    const totT = monthRecs.reduce((s,r)=>s+r.treat,0), totM = monthRecs.reduce((s,r)=>s+r.med,0);
    const pb = mk('button','pdf-btn'); pb.textContent = '🖨 PDF生成（印刷）';
    pb.onclick = () => doPdf(null, year, mo); c.appendChild(pb);
    const dayMap = {};
    monthRecs.forEach(r => { if(!dayMap[r.date]) dayMap[r.date]=[]; dayMap[r.date].push(r); });
    Object.keys(dayMap).sort().reverse().forEach(day => {
      const dg = mk('div','day-group');
      const dh = mk('div','day-header'); dh.textContent = dateLabel(day); dg.appendChild(dh);
      dayMap[day].forEach(rec => dg.appendChild(buildRecItem(rec, ()=>renderYear(year,mo))));
      c.appendChild(dg);
    });
    appendSummaryBar(c, totT, totM, monthRecs.length);
  }
}

    const dayMap = {};
    monthRecs.forEach(r => { if(!dayMap[r.date]) dayMap[r.date]=[]; dayMap[r.date].push(r); });

function getLinkedRecord(r) {
  const rdt = new Date(r.dt);
  const rDate = `${rdt.getFullYear()}/${String(rdt.getMonth()+1).padStart(2,'0')}/${String(rdt.getDate()).padStart(2,'0')}`;
  return records.find(rec => rec.date===rDate && rec.hosp===r.hosp && rec.dept===r.dept) || null;
}

function renderReserve() {
  const c = document.getElementById('hview-rv'); c.innerHTML = '';
  const now = new Date();
  const tl = mk('div','today-lbl');
  tl.textContent = `TODAY ${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}（${DOW[now.getDay()]}）`;
  c.appendChild(tl);

  const fut = reserves.filter(r=>new Date(r.dt)>now).sort((a,b)=>new Date(a.dt)-new Date(b.dt));
  fut.forEach(r => c.appendChild(buildResItem(r)));

  const ab = mk('button','add-res-btn'); ab.textContent='＋ 予約を追加';
  ab.onclick = openReserveModal; c.appendChild(ab);

  const pb = mk('button','show-past-btn');
  pb.textContent = showPast ? '📋 過去の予約を隠す' : '📋 過去の予約を表示';
  pb.onclick = () => { showPast=!showPast; renderReserve(); }; c.appendChild(pb);

  if (showPast) {
    const past = reserves.filter(r=>new Date(r.dt)<=now).sort((a,b)=>new Date(b.dt)-new Date(a.dt));
    const pw = mk('div'); pw.style.marginTop='8px';
    past.forEach(r => pw.appendChild(buildResItem(r, true)));
    c.appendChild(pw);
  }
}

function buildResItem(r, isPast=false) {
  const linked = getLinkedRecord(r);
  const d = mk('div','res-item '+(linked?'has-detail':'no-detail'));
  const icon = mk('span','res-icon'); icon.textContent = linked ? '📋' : '⚠️';
  const body = mk('div','res-body');
  body.innerHTML = `<div class="res-dt">${dtLabel(r.dt)}</div><div class="res-hp">${r.hosp} / ${r.dept}</div>`;
  d.appendChild(icon); d.appendChild(body);
  if (linked) d.onclick = () => openDetail(linked.id, ()=>{ switchHTab('rv'); });
  return d;
}

  items.forEach((item,i) => {

    if (item.fn) { const s=mk('span','bc-link'); s.textContent=item.label; s.onclick=item.fn; bc.appendChild(s); }
    else { const s=mk('span'); s.textContent=item.label; s.style.color='#fff'; bc.appendChild(s); }

}

      ${mode==='copy'?'<div style="font-size:11px;color:#F9A825;margin-top:4px">⚠️ 日付を変更してから保存してください</div>':''}
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">🏥 病院名</div>
      <button class="edit-sel-btn" id="edit-hosp-btn" onclick="openListModal('edit-hosp')">
        <span>${rec.hosp}</span><span>▼</span>
      </button>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">✏️ 科目</div>
      <button class="edit-sel-btn" id="edit-dept-btn" onclick="openListModal('edit-dept')">
        <span>${rec.dept}</span><span>▼</span>
      </button>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">📞 診察</div>
      <div class="edit-chip-grp">
        <button class="edit-chip${rec.exam==='なし'?' sel':''}" onclick="setEditChip('exam','n',this)">なし</button>
        <button class="edit-chip${rec.exam==='あり'?' sel':''}" onclick="setEditChip('exam','y',this)">あり</button>
      </div>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">🩻 画像検査</div>
      <div class="edit-chip-grp">
        ${['0','xp','ct','mr'].map(v=>`<button class="edit-chip${(imgValMap[rec.img]||'0')===v?' sel':''}" onclick="setEditChip('img','${v}',this)">${v==='0'?'無':v.toUpperCase()}</button>`).join('')}
      </div>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">🩸 血液検査</div>
      <div class="edit-chip-grp">
        <button class="edit-chip${rec.blood==='なし'?' sel':''}" onclick="setEditChip('blood','n',this)">なし</button>
        <button class="edit-chip${rec.blood==='あり'?' sel':''}" onclick="setEditChip('blood','y',this)">あり</button>
      </div>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">➕ 追加検査</div>
      <div class="edit-chip-grp">
        <button class="edit-chip${rec.addTest==='なし'?' sel':''}" onclick="setEditChip('addTest','n',this)">なし</button>
        <button class="edit-chip${rec.addTest==='あり'?' sel':''}" onclick="setEditChip('addTest','y',this)">あり</button>
      </div>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">🏥 治療費</div>
      <div class="edit-fee-wrap">
        <span class="edit-fee-yen">¥</span>
        <input type="text" inputmode="numeric" class="edit-fee-inp" id="edit-treat"
          value="${rec.treat>0?fmtComma(rec.treat):''}" placeholder="0"
          oninput="onEditFeeInput(this)" onblur="onEditFeeBlur(this)">
      </div>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">💊 薬料金</div>
      <div class="edit-fee-wrap">
        <span class="edit-fee-yen">¥</span>
        <input type="text" inputmode="numeric" class="edit-fee-inp" id="edit-med"
          value="${rec.med>0?fmtComma(rec.med):''}" placeholder="0"
          oninput="onEditFeeInput(this)" onblur="onEditFeeBlur(this)">
      </div>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">💊 薬の数</div>
      <div class="drug-stepper" style="background:rgba(255,255,255,.1)">
        <button class="stepper-btn" onclick="stepEditDrug(-1)">－</button>
        <span class="stepper-val" id="edit-drug-val" style="color:#fff">${rec.drug}</span>
        <button class="stepper-btn" onclick="stepEditDrug(1)">＋</button>
      </div>
    </div>
    <div class="edit-sec">
      <div class="edit-sec-lbl">📝 メモ（8文字）</div>
      <input type="text" class="edit-inp" id="edit-memo" value="${rec.memo}" maxlength="8">
    </div>
    <div style="height:20px"></div>
  `;
  editState.editDrug = rec.drug;
  document.getElementById('edit-screen').classList.add('open');
}

function onEditFeeInput(el) {
  const raw = toHankaku(el.value).replace(/[^0-9]/g,'');
  el.value = raw ? fmtComma(parseInt(raw)) : '';
}
function onEditFeeBlur(el) {
  const n = rawNum(el.value); el.value = n>0 ? fmtComma(n) : '';
}
function stepEditDrug(d) {
  editState.editDrug = Math.max(0,(editState.editDrug||0)+d);
  document.getElementById('edit-drug-val').textContent = editState.editDrug;
}
function setEditChip(field, val, btn) {
  const imgMap = {0:'無',xp:'XP',ct:'CT',mr:'MR'};
  if (field==='img')     editState.img     = imgMap[val];
  else if(field==='exam')    editState.exam    = val==='y'?'あり':'なし';
  else if(field==='blood')   editState.blood   = val==='y'?'あり':'なし';
  else if(field==='addTest') editState.addTest = val==='y'?'あり':'なし';
  btn.parentElement.querySelectorAll('.edit-chip').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function commitEdit() {
  const treatNum = rawNum(document.getElementById('edit-treat').value);
  const medNum   = rawNum(document.getElementById('edit-med').value);
  const dateVal  = document.getElementById('edit-date').value;
  const ds = dateVal.replace(/-/g,'/');
  editState.date  = ds; editState.dow   = getDow(ds);
  editState.treat = treatNum; editState.med = medNum;
  editState.drug  = editState.editDrug||0;
  editState.memo  = document.getElementById('edit-memo').value.slice(0,8);

  showLoading(editMode==='copy'?'複製して保存中...':'更新中...');
  if (editMode==='copy') {
    const newRec = {...editState, id:Date.now()};
    gasCall('saveRecord', newRec,
      res => {
        hideLoading();
        records.unshift(newRec);
        closeEdit(); closeDetail();
        showToast('📋 複製して保存しました'); renderHist();
      },
      () => hideLoading()
    );
  } else {
    const updated = {...editState, id:editId};
    gasCall('updateRecord', updated,
      res => {
        hideLoading();
        const idx = records.findIndex(r=>r.id===editId);
        if(idx>=0) records[idx]=updated;
        closeEdit(); closeDetail();
        showToast('✅ 更新しました'); renderHist();
      },
      () => hideLoading()
    );
  }
}

function closeEdit() { document.getElementById('edit-screen').classList.remove('open'); }

// ══════════════════════════════════════════════════════
// ⑦ PDF生成：ゼロ埋めしたmonthをGASに渡す
// ══════════════════════════════════════════════════════
function doPdf(hosp, year, month) {
  const mo = padMonth(month); // ⑦ ゼロ埋め統一
  showLoading('PDF生成中...');
  if (IS_GAS) {
    google.script.run
      .withSuccessHandler(res => {
        hideLoading();
        if (res && res.ok) showToast('📄 PDF保存完了: ' + (res.fileName||''), 'info');
        else showToast('⚠️ PDF生成エラー: ' + (res ? res.error : ''), 'error');
      })
      .withFailureHandler(err => {
        hideLoading();
        showToast('⚠️ PDFエラー: ' + (err.message||err), 'error');
        console.error('[PDFエラー]', err);
      })
      .handlePdfFromClient({ hosp: hosp||null, year, month: mo||null });
  } else {
    hideLoading();
    alert(`PDF生成完了\n${hosp||'全病院'} ${year}年${mo?mo+'月':''}\nDriveへ保存しました`);
  }
}

// ══════════════════════════════════════════════════════
// 起動
// ══════════════════════════════════════════════════════
initApp();
</script>
</body>
</html>
