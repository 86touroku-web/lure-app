<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ルアー在庫管理</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none;}
html{font-size:72%;overscroll-behavior:none;-webkit-text-size-adjust:100%;}
body{font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;font-size:1.4rem;background:linear-gradient(135deg,#1a6b3c 0%,#0d4f8c 100%);width:100%;height:100dvh;overflow:hidden;position:relative;-webkit-font-smoothing:antialiased;}
*::-webkit-scrollbar{display:none;}
:root{
  --green-mid:#25a55a;--blue-mid:#1976d2;--blue-light:#42a5f5;--teal:#00bcd4;
  --yellow:#ffd740;--red:#f44336;--orange:#ff9800;
  --card-bg:rgba(255,255,255,0.96);--card-bg2:rgba(255,255,255,0.15);
  --text-dark:#1a1a2e;--text-mid:#37474f;
  --tab-h:7rem;--h-inp:4.8rem;--h-btn:5.2rem;--r:.8rem;
  --fs-xs:1.25rem;--fs-sm:1.45rem;--fs-md:1.6rem;--fs-lg:1.9rem;
  --hdr-red:#e53935;--hdr-orange:#e65100;--hdr-blue:#1565c0;--hdr-green:#00F562;
  --bg-red:#ffd6d6;--bg-orange:#ffd9b3;--bg-blue:#c2d9ff;--bg-green:#b3ffda;
}
/* ── LOADING ── */
.loading-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;}
.loading-ov.show{display:flex;}
.spinner{width:4rem;height:4rem;border:.4rem solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-msg{color:#fff;font-size:var(--fs-md);font-weight:700;}
/* ── TOAST ── */
.toast{display:none;position:fixed;top:1.6rem;left:50%;transform:translateX(-50%);z-index:998;padding:.8rem 2rem;border-radius:2rem;font-size:var(--fs-sm);font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3);background:var(--green-mid);}
.toast.err{background:var(--red);}
.toast.show{display:block;animation:fadeInOut 2.5s ease forwards;}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-8px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}75%{opacity:1;}100%{opacity:0;}}
/* ── DIALOG ── */
.dialog-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;align-items:center;justify-content:center;padding:0 1.6rem;}
.dialog-ov.open{display:flex;}
.dialog-box{background:#fff;border-radius:1.6rem;padding:2.4rem 2rem 2rem;width:100%;max-width:40rem;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.dialog-title{font-size:var(--fs-lg);font-weight:800;color:var(--text-dark);margin-bottom:1rem;text-align:center;}
.dialog-msg{font-size:var(--fs-md);color:var(--text-mid);margin-bottom:1.6rem;line-height:1.6;text-align:center;white-space:pre-wrap;}
.dialog-btns{display:flex;gap:1rem;}
.dialog-cancel{flex:1;border-radius:var(--r);cursor:pointer;font-weight:700;background:#fff;border:.2rem solid var(--red);color:var(--red);font-size:var(--fs-md);height:var(--h-btn);}
.dialog-ok{flex:1;border-radius:var(--r);cursor:pointer;font-weight:700;background:var(--blue-mid);border:none;color:#fff;font-size:var(--fs-md);height:var(--h-btn);}
/* ── SCAN ── */
/* ── スキャナーモーダル（html5-qrcode） ── */
.scan-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:800;flex-direction:column;align-items:center;}
.scan-ov.open{display:flex;}
.scan-header{width:100%;padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.5);flex-shrink:0;}
.scan-title{color:#fff;font-size:var(--fs-lg);font-weight:800;}
.scan-close-btn{width:3.8rem;height:3.8rem;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;font-size:1.8rem;color:#fff;display:flex;align-items:center;justify-content:center;}
.scan-viewport{flex:1;width:100%;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#qr-reader{width:100%!important;max-width:100%!important;}
#qr-reader video{width:100%!important;height:auto!important;object-fit:cover;}
#qr-reader img{display:none!important;}
#qr-reader__dashboard{display:none!important;}
#qr-reader__status_span{display:none!important;}
#qr-reader__header_message{display:none!important;}
.scan-frame-ov{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.scan-frame{position:relative;width:min(72vw,26rem);height:min(72vw,26rem);}
.scan-frame::before,.scan-frame::after,.scan-frame .c3,.scan-frame .c4{content:'';position:absolute;width:2.8rem;height:2.8rem;border-color:#4cca80;border-style:solid;}
.scan-frame::before{top:0;left:0;border-width:.4rem 0 0 .4rem;border-radius:.4rem 0 0 0;}
.scan-frame::after{top:0;right:0;border-width:.4rem .4rem 0 0;border-radius:0 .4rem 0 0;}
.scan-frame .c3{bottom:0;left:0;border-width:0 0 .4rem .4rem;border-radius:0 0 0 .4rem;}
.scan-frame .c4{bottom:0;right:0;border-width:0 .4rem .4rem 0;border-radius:0 0 .4rem 0;}
.scan-line{position:absolute;left:2%;right:2%;height:.2rem;background:linear-gradient(90deg,transparent,#4cca80,#00bcd4,#4cca80,transparent);box-shadow:0 0 8px #4cca80;animation:scanLine 2s ease-in-out infinite;}
@keyframes scanLine{0%{top:4%;}50%{top:92%;}100%{top:4%;}}
.scan-hint{flex-shrink:0;padding:.8rem 1.4rem 1.6rem;text-align:center;color:rgba(255,255,255,.75);font-size:var(--fs-sm);line-height:1.6;}
.scan-cam-btn{margin-bottom:.6rem;padding:.5rem 1.4rem;border-radius:2rem;background:rgba(255,255,255,.15);border:.1rem solid rgba(255,255,255,.3);color:#fff;font-size:var(--fs-sm);font-weight:700;cursor:pointer;}
/* ── TAB ── */
.tab-bar{position:absolute;bottom:0;left:0;right:0;height:var(--tab-h);background:rgba(13,79,140,.97);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -2px 12px rgba(0,0,0,.25);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;cursor:pointer;border:none;background:none;padding:0;color:rgba(255,255,255,.5);border-top:.3rem solid transparent;}
.tab-btn.active{color:#fff;border-top-color:var(--yellow);}
.tab-icon{font-size:2.4rem;line-height:1;}
.tab-label{font-size:var(--fs-xs);font-weight:700;}
/* ── SCREENS ── */
.screen{position:absolute;top:0;left:0;right:0;bottom:var(--tab-h);overflow-y:auto;overflow-x:hidden;display:none;padding:.8rem .8rem 2rem;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;}
.page-title{text-align:center;font-size:var(--fs-lg);font-weight:800;color:#fff;margin-bottom:.8rem;}
/* ── ブロックカード ── */
.block-card{border-radius:1.2rem;padding:1rem;margin-bottom:.8rem;box-shadow:0 2px 8px rgba(0,0,0,.12);position:relative;}
.block-card::before{content:'';position:absolute;inset:0;border-radius:1.2rem;z-index:0;}
.block-card>*{position:relative;z-index:1;}
.card-red::before{background:var(--bg-red);}
.card-orange::before{background:var(--bg-orange);}
.card-blue::before{background:var(--bg-blue);}
.card-green::before{background:var(--bg-green);}
.block-title{font-size:var(--fs-sm);font-weight:800;padding:.3rem .9rem;border-radius:.5rem;margin-bottom:.8rem;display:inline-block;}
.bt-red{background:var(--hdr-red);color:#fff;}
.bt-orange{background:var(--hdr-orange);color:#fff;}
.bt-blue{background:var(--hdr-blue);color:#fff;}
.bt-green{background:var(--hdr-green);color:#1a1a2e;}
/* ── 共通ボタン・入力 ── */
.inp{width:100%;background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);padding:0 1rem;color:var(--text-dark);outline:none;font-size:var(--fs-md);font-weight:600;height:var(--h-inp);}
.inp:focus{border-color:var(--blue-mid);background:#fff;}
.sel-btn{width:100%;background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);padding:0 1rem;color:var(--text-dark);cursor:pointer;font-size:var(--fs-md);font-weight:600;height:var(--h-inp);display:flex;align-items:center;justify-content:space-between;}
.big-btn{width:100%;border-radius:var(--r);border:none;cursor:pointer;font-weight:800;color:#fff;height:var(--h-btn);font-size:var(--fs-md);display:flex;align-items:center;justify-content:center;gap:.4rem;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.big-btn:active{opacity:.8;}
.btn-scan{background:linear-gradient(90deg,var(--green-mid),var(--teal));}
.btn-save{background:linear-gradient(90deg,var(--blue-mid),var(--blue-light));}
.btn-clear{background:linear-gradient(90deg,#78909c,#90a4ae);}
.btn-danger{background:linear-gradient(90deg,var(--red),var(--orange));}
.btn-search{background:linear-gradient(90deg,var(--blue-mid),var(--blue-light));}
.btn-row{display:flex;gap:.8rem;margin-bottom:.8rem;}
.btn-row .big-btn{flex:1;}
/* ── A: 検索ブロック ── */
.search-block{display:flex;gap:.6rem;align-items:stretch;}
.scan-col{flex:0 0 9rem;}
/* スキャンボタンと右側の高さを完全一致させる */
.scan-col .big-btn{
  height:100%;
  min-height:calc(var(--h-inp) * 2 + .4rem);
  flex-direction:column;gap:.3rem;font-size:var(--fs-sm);line-height:1.3;
}
.search-right{flex:1;display:flex;flex-direction:column;gap:.4rem;}
.search-right .inp{height:var(--h-inp);flex:1;}
.search-right .btn-search{height:var(--h-inp);font-size:var(--fs-sm);}
/* ① 検索入力テキスト中央寄せ */
#search-input,#bulk-search-input{text-align:center;}
/* ── B: 商品情報ブロック ── */
.product-layout{display:flex;gap:.8rem;align-items:flex-start;}
/* 画像：拡大（紺丸サイズ） */
.product-img-col{flex:0 0 13rem;}
.product-img{width:13rem;height:13rem;border-radius:var(--r);object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.15);background:#f5f5f5;display:block;}
.no-img{width:13rem;height:13rem;background:#eceff1;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#90a4ae;font-size:1.2rem;gap:.3rem;}
/* 右列：縦一直線・凸凹なし */
.product-info-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:.4rem;}
.info-row{display:grid;grid-template-columns:5rem 1fr;align-items:baseline;gap:.3rem;}
.info-lbl{font-size:var(--fs-xs);font-weight:700;color:var(--hdr-orange);white-space:nowrap;}
.info-val{font-size:var(--fs-sm);font-weight:700;color:var(--text-dark);line-height:1.3;word-break:break-all;white-space:normal;}
#ship-name{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:visible;}
/* ── C: 発送処理ブロック ── */
/* ステータス行：1行表示 */
.c-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;}
.c-lbl{font-size:var(--fs-sm);font-weight:700;color:var(--hdr-blue);white-space:nowrap;flex:0 0 5.5rem;}
.c-val{flex:1;}
/* 販売済ボタン（デフォルト：チップと同じグレー消灯） */
.cur-status-btn{
  width:100%;height:4rem;border-radius:var(--r);
  border:.15rem solid #cfd8dc;
  font-size:var(--fs-md);font-weight:800;cursor:pointer;
  background:#f0f4f8;color:var(--text-mid);
  display:flex;align-items:center;justify-content:center;
  box-shadow:none;letter-spacing:.05em;
}
/* 販売済ハイライトON（青点灯） */
.cur-status-btn.sold{
  background:var(--blue-mid);color:#fff;
  border-color:var(--blue-mid);
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
/* ステータスチップ（販売済を除く6個） */
.chip-grp{display:flex;flex-wrap:nowrap;gap:.3rem;margin-bottom:.5rem;}
.chip{flex:1;padding:.35rem .2rem;border-radius:2rem;border:.15rem solid #cfd8dc;cursor:pointer;font-size:var(--fs-sm);font-weight:700;background:#f0f4f8;color:var(--text-mid);white-space:nowrap;text-align:center;}
.chip.sel{background:var(--blue-mid);color:#fff;border-color:var(--blue-mid);}
/* 在庫確認チップ（有・無 各1/2幅） */
.stock-chip-grp{display:flex;gap:.5rem;margin-top:.3rem;}
.stock-chip{flex:1;padding:.35rem .2rem;border-radius:2rem;border:.15rem solid #cfd8dc;cursor:pointer;font-size:var(--fs-sm);font-weight:700;background:#f0f4f8;color:var(--text-mid);text-align:center;}
.stock-chip.sel{background:var(--blue-mid);color:#fff;border-color:var(--blue-mid);}
.divider{height:.1rem;background:#e0e0e0;margin:.5rem 0;}
/* 販売済日・販売金額：1行表示 */
.edit-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;}
.edit-lbl{font-size:var(--fs-sm);font-weight:700;color:var(--hdr-blue);white-space:nowrap;flex:0 0 5.5rem;}
.edit-inp{flex:1;background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);padding:0 .8rem;color:var(--text-dark);outline:none;font-size:var(--fs-md);font-weight:600;height:4rem;}
.edit-inp:focus{border-color:var(--blue-mid);background:#fff;}
/* 販売金額 ¥プレフィックス付き */
.price-wrap{flex:1;display:flex;align-items:center;background:#fff;border:.15rem solid #cfd8dc;border-radius:var(--r);height:4rem;overflow:hidden;}
.price-prefix{flex:0 0 auto;padding:0 .1rem 0 .8rem;font-size:var(--fs-md);font-weight:700;color:var(--text-dark);line-height:1;display:flex;align-items:center;}
.price-inp{flex:1;border:none;background:transparent;padding:0 .8rem 0 .2rem;color:var(--text-dark);font-size:var(--fs-md);font-weight:600;height:100%;outline:none;}
.price-inp::placeholder{color:rgba(55,71,79,.45);}
.edit-inp::placeholder{color:rgba(55,71,79,.45);}
.inp::placeholder{color:rgba(55,71,79,.45);}
/* ── D: 詳細情報ブロック ── */
.detail-grid{display:grid;grid-template-columns:5.5rem 1fr;gap:.45rem .5rem;align-items:baseline;}
.d-lbl{font-size:var(--fs-sm);font-weight:700;color:#00994a;white-space:nowrap;}
.d-val{font-size:var(--fs-sm);font-weight:700;color:var(--text-dark);word-break:break-all;font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;}
/* ── 発送作業・一括編集 共通商品カード ── */
.ship-card{background:var(--card-bg);border-radius:var(--r);margin-bottom:.6rem;box-shadow:0 1px 4px rgba(0,0,0,.12);overflow:hidden;}
.ship-card-header{display:flex;align-items:flex-start;gap:.8rem;padding:1rem 1rem;cursor:pointer;position:relative;}
.ship-card-no{width:2.4rem;height:2.4rem;border-radius:50%;background:var(--blue-mid);color:#fff;font-size:var(--fs-xs);font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.2rem;}
/* Ⅲ 画像高さを発送法まで拡大（auto・min-height指定） */
.ship-card-img{width:6.5rem;min-height:8.5rem;object-fit:cover;border-radius:.5rem;flex-shrink:0;align-self:stretch;}
.ship-card-no-img{width:6.5rem;min-height:8.5rem;border-radius:.5rem;background:#e8eaf0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;color:#90a4ae;}
.ship-card-info{flex:1;min-width:0;}
.ship-card-row{font-size:var(--fs-sm);color:#37474f;line-height:1.7;word-break:break-all;display:flex;align-items:baseline;gap:.3rem;}
/* Ⅳ 見出し横幅を固定（2行にならないよう） */
.ship-card-row span.lbl{color:#78909c;font-size:var(--fs-xs);flex-shrink:0;width:4.2rem;min-width:4.2rem;}
/* Ⅱ BCとステータスチップの間にスペース */
.ship-card-bc{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.ship-card-price{font-size:var(--fs-sm);color:#1565c0;font-weight:700;margin-top:.2rem;}
.ship-card-del{position:absolute;top:.5rem;right:.5rem;width:2.2rem;height:2.2rem;border-radius:50%;background:#f44336;color:#fff;border:none;font-size:1rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;z-index:2;}
/* 展開エリア */
.ship-card-expand{display:none;padding:.5rem .8rem .8rem;border-top:.1rem solid #e0e0e0;background:#f8f9fa;}
.ship-card-expand.open{display:block;}
.ship-expand-price{margin-bottom:.5rem;}
.ship-expand-price .edit-lbl{font-size:var(--fs-sm);}
/* Ⅰ 詳細情報ボタンを発送処理ボタンと同じ配色（青） */
.ship-detail-btn{width:100%;padding:.6rem;border-radius:var(--r);border:none;background:var(--blue-mid);color:#fff;font-size:var(--fs-sm);font-weight:700;cursor:pointer;margin-top:.3rem;}
.ship-detail-area{margin-top:.5rem;background:#fff;border-radius:var(--r);padding:.6rem .8rem;display:none;}
.ship-detail-area.open{display:block;}
/* Ⅳ 詳細情報グリッド：見出し幅を広く設定 */
.ship-detail-grid{display:grid;grid-template-columns:5.5rem 1fr;gap:.35rem .4rem;}
.ship-d-lbl{font-size:var(--fs-sm);font-weight:700;color:#00994a;white-space:nowrap;}
.ship-d-val{font-size:var(--fs-sm);font-weight:700;color:var(--text-dark);word-break:break-all;}

/* ── リアルタイムチェックボタン ── */
.btn-realtime{width:100%;padding:.9rem;border-radius:var(--r);border:none;background:linear-gradient(90deg,#00897b,#00acc1);color:#fff;font-size:var(--fs-md);font-weight:800;cursor:pointer;margin-bottom:.6rem;letter-spacing:.05em;}
/* ── ヤフオク管理ポップアップ ── */
.yahoo-popup-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:center;justify-content:center;}
.yahoo-popup-ov.open{display:flex;}
.yahoo-popup{background:#fff;border-radius:1.2rem;padding:1.8rem 1.4rem;width:88%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.25);}
.yahoo-popup-title{font-size:var(--fs-md);font-weight:800;color:var(--text-dark);text-align:center;margin-bottom:1.4rem;}
.yahoo-popup-btn{width:100%;padding:1rem;border-radius:var(--r);border:none;font-size:var(--fs-sm);font-weight:800;cursor:pointer;margin-bottom:.7rem;}
.yahoo-popup-btn.clear{background:linear-gradient(90deg,#43a047,#66bb6a);color:#fff;}
.yahoo-popup-btn.check{background:linear-gradient(90deg,#1565c0,#1976d2);color:#fff;}
.yahoo-popup-btn.close{background:#f0f4f8;color:var(--text-mid);margin-bottom:0;}
.yahoo-popup-result{font-size:var(--fs-xs);color:#1565c0;text-align:center;margin-bottom:.5rem;min-height:1.8rem;}

/* ── ステータスチップ色（発送作業・一括編集共通） ── */
/* テキストは常に#050505、背景色を最下層に配色 */
.chip{position:relative;}
.chip::before{content:'';position:absolute;inset:0;border-radius:2rem;z-index:0;}
.chip span,.chip{position:relative;z-index:1;}
/* 各ステータス別背景色 */
.chip[data-st="在庫"]   {background:#f5c158!important;border-color:#f5c158!important;color:#050505!important;}
.chip[data-st="検品済"] {background:#c2d9ff!important;border-color:#c2d9ff!important;color:#050505!important;}
.chip[data-st="保品"]   {background:#ffffff!important;border-color:#cfd8dc!important;color:#050505!important;}
.chip[data-st="No有"]   {background:#b9f6ca!important;border-color:#b9f6ca!important;color:#050505!important;}
.chip[data-st="出タイ待"]{background:#e546fa!important;border-color:#e546fa!important;color:#050505!important;}
.chip[data-st="出品"]   {background:#f44336!important;border-color:#f44336!important;color:#050505!important;}
.chip[data-st="販売済"] {background:#9e9e9e!important;border-color:#9e9e9e!important;color:#050505!important;}
/* 選択時：色を保ちつつ太枠でハイライト */
.chip.sel[data-st="在庫"]   {border-color:#c8960a!important;box-shadow:0 0 0 .2rem #c8960a;}
.chip.sel[data-st="検品済"] {border-color:#1565c0!important;box-shadow:0 0 0 .2rem #1565c0;}
.chip.sel[data-st="保品"]   {border-color:#90a4ae!important;box-shadow:0 0 0 .2rem #90a4ae;}
.chip.sel[data-st="No有"]   {border-color:#00994a!important;box-shadow:0 0 0 .2rem #00994a;}

<script>
// GitHub Pages直接アクセス用GAS URL
const GAS_URL='https://script.google.com/macros/s/AKfycbyV5NXK_4Lv5DfSDJfRXA5l1LlRISqa9TsGrGQi95Baq_tbCLx3j5pawaRSmQnny2-jEQ/exec';
// 発送処理チップ：販売済を除く6個
const SHIP_STATUSES=['在庫','検品済','保品','No有','出タイ待','出品'];
// 一括編集チップ：全7個
const ALL_STATUSES=['在庫','検品済','保品','No有','出タイ待','出品','販売済'];

let masters={statuses:ALL_STATUSES,shippings:[],shops:[],makers:[],nameList:[]};
let shipItem=null,shipStatus='';
const CONDITION_LIST=['未使用','未使用に近い','目立ったキズや汚れナシ','目立ったキズや汚れアリ','キズや汚れアリ','全体に状態が悪い'];
let bulkItems=[],bulkStatus='',bulkShop='',bulkNameId='',bulkNameLabel='',bulkCondition='',bulkStorageBarcode='',bulkStockCheck='';
let scanMode='',popupTarget='';

// ── GAS通信（JSONP方式・GitHub Pages直接アクセス用） ──
function gasCall(fn,payload,ok,ng){
  const cbName='_gasCallback_'+Date.now();
  const script=document.createElement('script');
  let done=false;
  const timer=setTimeout(()=>{
    if(!done){done=true;cleanup();
      if(ng)ng(new Error('timeout'));else showToast('⚠️ 通信タイムアウト','err');}
  },15000);
  function cleanup(){
    delete window[cbName];
    if(script.parentNode)script.parentNode.removeChild(script);
    clearTimeout(timer);
  }
  window[cbName]=function(r){if(done)return;done=true;cleanup();if(ok)ok(r);};
  script.onerror=function(){
    if(done)return;done=true;cleanup();
    if(ng)ng(new Error('script error'));else showToast('⚠️ 通信エラー','err');
  };
  script.src=GAS_URL+'?fn='+encodeURIComponent(fn)
    +'&payload='+encodeURIComponent(JSON.stringify(payload))
    +'&callback='+cbName;
  document.head.appendChild(script);
}
// ── UI共通 ──
function showLoad(m){document.getElementById('loading-msg').textContent=m||'処理中...';document.getElementById('loading-ov').classList.add('show');}
function hideLoad(){document.getElementById('loading-ov').classList.remove('show');}
let _tt=null;
function showToast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast'+(type==='err'?' err':'')+' show';if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2600);}
function showDialog(title,msg,okCb,cancelCb){
  document.getElementById('dialog-title').textContent=title;
  document.getElementById('dialog-msg').textContent=msg;
  const cb=document.getElementById('dialog-cancel');cb.style.display=cancelCb?'':'none';
  cb.onclick=()=>{closeDialog();if(cancelCb)cancelCb();};
  document.getElementById('dialog-ok').onclick=()=>{closeDialog();if(okCb)okCb();};
  document.getElementById('dialog-ov').classList.add('open');
}
function closeDialog(){document.getElementById('dialog-ov').classList.remove('open');}
function setText(id,val){const el=document.getElementById(id);if(el)el.textContent=val||'-';}
function changeTab(n){
  // ① タブ切り替え時に入力内容をクリア（2重変更防止）
  if(n==='bulk') clearShip();
  if(n==='ship') clearBulk();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
}
// ── ポップアップ ──
function openPopup(target){
  popupTarget=target;const listEl=document.getElementById('popup-list');listEl.innerHTML='';
  let items=[],title='選択',current='';
  if(target==='bulk-shop'){title='店名';items=masters.shops;current=bulkShop;}
  else if(target==='bulk-name'){title='商品名';items=masters.nameList.map(n=>n.name);current=bulkNameLabel;}
  else if(target==='bulk-condition'){title='状態';items=CONDITION_LIST;current=bulkCondition;}
  document.getElementById('popup-title').textContent=title;
  items.forEach(item=>{
    const d=document.createElement('div');
    d.className='popup-item'+(item===current?' selected':'');
    d.textContent=item;d.onclick=()=>selectPopupItem(item);
    listEl.appendChild(d);
  });
  document.getElementById('popup-ov').classList.add('open');
}
function selectPopupItem(val){
  if(popupTarget==='bulk-shop'){bulkShop=val;document.getElementById('bulk-shop-val').textContent=val;}
  else if(popupTarget==='bulk-name'){bulkNameLabel=val;const f=masters.nameList.find(n=>n.name===val);bulkNameId=f?f.id:'';document.getElementById('bulk-name-val').textContent=val;}
  else if(popupTarget==='bulk-condition'){bulkCondition=val;document.getElementById('bulk-condition-val').textContent=val;}
  closePopup();
}
// ── ヤフオク管理ポップアップ ──────────────────────────────────
function closePopup(){document.getElementById('popup-ov').classList.remove('open');}
// ── 在庫確認チップ選択 ──
function selectStockCheck(val){
  bulkStockCheck=val;
  document.getElementById('stock-chip-yes').classList.toggle('sel',val==='有');
  document.getElementById('stock-chip-no').classList.toggle('sel',val==='無');
}
// ── 販売済ボタンタップ処理 ──
function selectSold(){
  if(!shipItem)return;
  // 販売済をshipStatusにセット
  shipStatus='販売済';
  // 販売済ボタンを青点灯
  document.getElementById('ship-cur-status').classList.add('sold');
  // チップを全て消灯（販売済は6個チップに含まれないため全解除）
  document.querySelectorAll('#ship-status-chips .chip').forEach(c=>c.classList.remove('sel'));
}
// ── ステータスチップ ──
function buildStatusChips(id,statusList,getV,setV){
  const grp=document.getElementById(id);grp.innerHTML='';
  statusList.forEach(s=>{
    const b=document.createElement('button');
    b.className='chip'+(getV()===s?' sel':'');
    b.textContent=s;
    b.dataset.st=s;// ステータス色CSS用
    b.onclick=()=>{setV(s);grp.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));b.classList.add('sel');};
    grp.appendChild(b);
  });
}
// ── html5-qrcode スキャン ──
let html5QrCode=null,availableCams=[],currentCamIdx=0,scanCooldown=false;

async function startScan(mode){
  scanMode=mode;
  scanCooldown=false;
  document.getElementById('scan-ov').classList.add('open');
  // カメラ一覧取得（初回のみ）
  if(availableCams.length===0){
    try{
      availableCams=await Html5Qrcode.getCameras();
      console.log('カメラ一覧:',availableCams.map((c,i)=>`[${i}] ${c.label}`));
    }catch(e){
      showToast('⚠️ カメラへのアクセスが拒否されました','err');
      document.getElementById('scan-ov').classList.remove('open');
      return;
    }
  }
  document.getElementById('cam-switch-btn').style.display=availableCams.length>1?'inline-block':'none';
  // 初回：後カメラ（マクロ寄り）を選択
  if(availableCams.length>1 && currentCamIdx===0){
    let idx=availableCams.findIndex(c=>c.label&&/macro|接写|telephoto/i.test(c.label));
    if(idx<0){
      // 後カメラ群の最大インデックス（Galaxy=マクロ寄り）
      const backIdx=[];
      availableCams.forEach((c,i)=>{if(!c.label||/back|rear|environment|後/i.test(c.label))backIdx.push(i);});
      if(backIdx.length>0)idx=backIdx[backIdx.length-1];
    }
    if(idx<0)idx=availableCams.length-1;
    currentCamIdx=idx;
    console.log('選択カメラ:',availableCams[currentCamIdx]?.label);
  }
  await launchCamera();
}

async function launchCamera(){
  if(html5QrCode){try{await html5QrCode.stop();}catch(e){}html5QrCode=null;}
  document.getElementById('qr-reader').innerHTML='';
  html5QrCode=new Html5Qrcode('qr-reader',{verbose:false});
  const camId=availableCams[currentCamIdx]?.id;
  if(!camId)return;
  const cfg={
    fps:15,aspectRatio:1.0,
    formatsToSupport:[
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.ITF,
    ],
    experimentalFeatures:{useBarCodeDetectorIfSupported:true},
  };
  try{
    await html5QrCode.start(camId,cfg,onScanSuccess,()=>{});
  }catch(e){
    console.error('Camera start error:',e);
    showToast('⚠️ カメラの起動に失敗しました','err');
    stopScan();
  }
}

function onScanSuccess(decodedText){
  if(scanCooldown)return;
  scanCooldown=true;
  if(navigator.vibrate)navigator.vibrate(80);
  stopScan().then(()=>{
    setTimeout(()=>{
      // 保管場所スキャンモード：全角テキストをそのまま使用（toUpperCase不要）
      if(scanMode==='bulk-storage'){
        bulkStorageBarcode=decodedText;// trimもしない（全角スペース対応）
        document.getElementById('bulk-storage-val').textContent='📍 '+bulkStorageBarcode;
        showToast('✅ 保管場所: '+bulkStorageBarcode);
      } else {
        fetchProduct(decodedText.trim(),scanMode);
      }
      scanCooldown=false;
    },200);
  });
}

async function stopScan(){
  document.getElementById('scan-ov').classList.remove('open');
  if(html5QrCode){
    try{await html5QrCode.stop();}catch(e){console.warn('stop err:',e);}
    html5QrCode=null;
  }
  document.getElementById('qr-reader').innerHTML='';
}

async function switchCamera(){
  if(availableCams.length<=1)return;
  currentCamIdx=(currentCamIdx+1)%availableCams.length;
  await launchCamera();
}
// ── 手動検索 ──
function searchManual(){
  const val=document.getElementById('search-input').value.trim();
  if(!val){showToast('⚠️ バーコードまたは商品NOを入力してください','err');return;}
  document.getElementById('search-input').value='';
  fetchProduct(val,'ship');
}
function searchBulkManual(){
  const val=document.getElementById('bulk-search-input').value.trim();
  if(!val){showToast('⚠️ バーコードまたは商品NOを入力してください','err');return;}
  document.getElementById('bulk-search-input').value='';
  fetchProduct(val,'bulk');
}
// ── 商品検索 ──
function fetchProduct(keyword,mode){
  // 半角英数字のみの場合は大文字変換（全角文字含む場合はそのまま送信）
  const safeKeyword=/^[A-Za-z0-9\-]+$/.test(keyword)?keyword.toUpperCase():keyword;
  showLoad('商品照合中...');
  gasCall('getProductByBarcode',{barcode:safeKeyword,keyword:safeKeyword},res=>{
    hideLoad();
    if(res&&res.found){if(mode==='ship')addShipItem(res.item);else addBulkItem(res.item);}
    else showToast('⚠️ 未登録のバーコード / 商品NOです','err');
  },()=>{hideLoad();showToast('⚠️ 通信エラー','err');});
}
// ══════════════════════════════════════════════
//  共通：商品情報カードHTML生成
//  mode='ship'→販売金額入力あり
//  mode='bulk'→販売金額入力なし・削除ボタンスタイル異なる
// ══════════════════════════════════════════════
function buildItemCardHTML(item, idx, mode){
  // 画像HTML
  const imgHtml = item.imgUrl
    ? `<img class="ship-card-img" src="${item.imgUrl}" alt="商品画像"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
         onload="this.style.display='block';this.nextElementSibling.style.display='none'">
       <div class="ship-card-no-img" style="display:none">🖼️</div>`
    : `<div class="ship-card-no-img">🖼️</div>`;

  // Ⅱ BCとステータスチップの間にスペース1文字分
  const statusChip = item.ステータス
    ? `<span class="ship-card-status" data-st="${item.ステータス}">${item.ステータス}</span>` : '';

  // トグル関数名（発送・一括で別々）
  const toggleFn   = mode==='ship' ? `toggleShipCard(${idx})`   : `toggleBulkCard(${idx})`;
  const detailFn   = mode==='ship' ? `toggleShipDetail(${idx})` : `toggleBulkDetail(${idx})`;
  const expandId   = mode==='ship' ? `ship-expand-${idx}`       : `bulk-expand-${idx}`;
  const detailBtnId= mode==='ship' ? `ship-detail-btn-${idx}`   : `bulk-detail-btn-${idx}`;
  const detailAreaId=mode==='ship' ? `ship-detail-area-${idx}`  : `bulk-detail-area-${idx}`;
  const delFn      = mode==='ship'
    ? `event.stopPropagation();removeShipItem(${idx})`
    : `event.stopPropagation();removeBulkItem(${idx})`;

  // 販売金額行（発送作業のみ）
  const curPrice = mode==='ship' ? (shipSellPrices[item.識別ID]||0) : 0;
  const priceRow = mode==='ship'
    ? `<div class="ship-card-price" id="ship-card-price-${idx}">${curPrice>0?'💴 ¥'+curPrice.toLocaleString():''}</div>`
    : '';

  // 展開内：販売金額入力（発送作業のみ）
  const priceInput = mode==='ship'
    ? `<div class="ship-expand-price">
        <div class="edit-row">
          <span class="edit-lbl">💴 販売金額</span>
          <div class="price-wrap">
            <span class="price-prefix">¥</span>
            <input type="text" inputmode="numeric" class="price-inp"
              value="${curPrice>0?curPrice:''}" placeholder="0"
              oninput="updateShipPrice(${idx},this.value)">
          </div>
        </div>
      </div>` : '';

  // Ⅴ 詳細情報から「状態」を削除（カード本体に表示）
  return `
    <div class="ship-card-header" onclick="${toggleFn}">
      <div class="ship-card-no">${idx+1}</div>
      ${imgHtml}
      <div class="ship-card-info">
        <div class="ship-card-row">
          <span class="lbl">BC</span>
          <span class="ship-card-bc">${item.バーコード||'-'} ${statusChip}</span>
        </div>
        <div class="ship-card-row"><span class="lbl">商品NO</span><span>${item.商品NO||'-'}</span></div>
        <div class="ship-card-row"><span class="lbl">保管BC</span><span>${item.保管バーコード||'-'}</span></div>
        <div class="ship-card-row"><span class="lbl">商品名</span><span>${item.商品名||'-'}</span></div>
        <div class="ship-card-row"><span class="lbl">状態</span><span>${item.状態||'-'}</span></div>
        <div class="ship-card-row"><span class="lbl">発送法</span><span>${item.発送手段||'-'}</span></div>
        ${priceRow}
      </div>
      <button class="ship-card-del" onclick="${delFn}">✕</button>
    </div>
    <div class="ship-card-expand" id="${expandId}">
      ${priceInput}
      <button class="ship-detail-btn" id="${detailBtnId}" onclick="${detailFn}">📋 詳細情報 ▼</button>
      <div class="ship-detail-area" id="${detailAreaId}">
        <div class="ship-detail-grid">
          <span class="ship-d-lbl">メーカー</span><span class="ship-d-val">${item.メーカー||'-'}</span>
          <span class="ship-d-lbl">カラー</span>  <span class="ship-d-val">${item.カラー||'-'}</span>
          <span class="ship-d-lbl">サイズ</span>  <span class="ship-d-val">${item.サイズ数量||'-'}</span>
          <span class="ship-d-lbl">備考</span>    <span class="ship-d-val">${item.備考||'-'}</span>
          <span class="ship-d-lbl">購入金額</span><span class="ship-d-val">${item.購入金額?'¥'+Number(item.購入金額).toLocaleString():'-'}</span>
          <span class="ship-d-lbl">購入日</span>  <span class="ship-d-val">${item.購入日||'-'}</span>
        </div>
      </div>
    </div>`;
}

// ── TAB1 発送作業（複数商品一括処理） ──
let shipItems=[];
let shipSellPrices={};

function addShipItem(item){
  if(shipItems.find(s=>s.識別ID===item.識別ID)){showToast('⚠️ すでに追加済みです','err');return;}
  shipItems.push(item);
  shipSellPrices[item.識別ID]=0;
  renderShipList();
  showToast('✅ '+(item.商品名||item.バーコード)+' を追加');
}

function removeShipItem(idx){
  const item=shipItems[idx];
  if(item)delete shipSellPrices[item.識別ID];
  shipItems.splice(idx,1);
  renderShipList();
}

function toggleShipCard(idx){
  const el=document.getElementById('ship-expand-'+idx);
  if(el){
    const isOpen=el.classList.toggle('open');
    // ④ 1タップで詳細情報も同時に展開・閉じる
    const detailArea=document.getElementById('ship-detail-area-'+idx);
    const detailBtn=document.getElementById('ship-detail-btn-'+idx);
    if(detailArea){
      if(isOpen){detailArea.classList.add('open');if(detailBtn)detailBtn.textContent='📋 詳細情報 ▲';}
      else{detailArea.classList.remove('open');if(detailBtn)detailBtn.textContent='📋 詳細情報 ▼';}
    }
  }
}

function toggleBulkCard(idx){
  const el=document.getElementById('bulk-expand-'+idx);
  if(el){
    const isOpen=el.classList.toggle('open');
    // ④ 1タップで詳細情報も同時に展開・閉じる
    const detailArea=document.getElementById('bulk-detail-area-'+idx);
    const detailBtn=document.getElementById('bulk-detail-btn-'+idx);
    if(detailArea){
      if(isOpen){detailArea.classList.add('open');if(detailBtn)detailBtn.textContent='📋 詳細情報 ▲';}
      else{detailArea.classList.remove('open');if(detailBtn)detailBtn.textContent='📋 詳細情報 ▼';}
    }
  }
}

function updateShipPrice(idx,val){
  const item=shipItems[idx];
  if(!item)return;
  const num=Number(val.replace(/[^0-9]/g,''))||0;
  shipSellPrices[item.識別ID]=num;
  const priceEl=document.getElementById('ship-card-price-'+idx);
  if(priceEl)priceEl.textContent=num>0?'💴 ¥'+num.toLocaleString():'';
}

function renderShipList(){
  const listEl=document.getElementById('ship-list');
  const count=shipItems.length;
  document.getElementById('ship-count').textContent=count+'件 追加済み';
  document.getElementById('ship-empty').style.display=count===0?'block':'none';
  document.getElementById('ship-form').style.display=count>0?'block':'none';
  listEl.innerHTML='';
  // ⑤ 逆順表示（最新追加が上）・番号は追加順のまま
  [...shipItems].reverse().forEach((item,revIdx)=>{
    const idx=shipItems.length-1-revIdx;
    const card=document.createElement('div');
    card.className='ship-card';
    card.innerHTML=buildItemCardHTML(item,idx,'ship');
    listEl.appendChild(card);
  });
}

function saveShipping(){
  if(shipItems.length===0){showToast('⚠️ 商品を追加してください','err');return;}
  const soldDate=document.getElementById('ship-sold-date').value;
  if(!soldDate){showToast('⚠️ 販売済日を入力してください','err');return;}

  // 確認ダイアログ
  const summary=shipItems.map((item,i)=>{
    const p=shipSellPrices[item.識別ID]||0;
    return `${i+1}. ${item.商品名||item.バーコード} ¥${p.toLocaleString()}`;
  }).join('\n');

  showDialog('一括発送保存（販売済）',
    `${shipItems.length}件を販売済に変更します\n\n${summary}\n\n販売済日: ${soldDate.replace(/-/g,'/')}\n\n保存しますか？`,
    ()=>{
      showLoad('保存中...');
      const items=shipItems.map(item=>({
        rowIndex:item.rowIndex,
        ステータス:'販売済',
        販売済日:soldDate.replace(/-/g,'/'),
        販売金額:shipSellPrices[item.識別ID]||0
      }));
      gasCall('bulkUpdate',{items:items},
        res=>{
          hideLoad();
          if(res&&res.ok){
            showToast('✅ '+items.length+'件 保存しました');
            clearShip();
          }else showToast('⚠️ 保存に失敗しました','err');
        },
        ()=>{hideLoad();showToast('⚠️ 通信エラー','err');});
    },null);
}

function clearShip(){
  shipItems=[];shipSellPrices={};
  document.getElementById('search-input').value='';
  renderShipList();
}
// ── TAB2 一括編集 ──
function addBulkItem(item){
  if(bulkItems.find(b=>b.識別ID===item.識別ID)){showToast('⚠️ すでに追加済みです','err');return;}
  bulkItems.push(item);renderBulkList();showToast('✅ '+(item.商品名||item.バーコード)+' を追加');
}
function removeBulkItem(idx){bulkItems.splice(idx,1);renderBulkList();}

function toggleBulkDetail(idx){
  // 詳細ボタン直接タップ時もトグル動作（toggleBulkCardと連動）
  const el=document.getElementById('bulk-detail-area-'+idx);
  const btn=document.getElementById('bulk-detail-btn-'+idx);
  if(!el)return;
  const isOpen=el.classList.toggle('open');
  if(btn)btn.textContent=isOpen?'📋 詳細情報 ▲':'📋 詳細情報 ▼';
}

function renderBulkList(){
  const listEl=document.getElementById('bulk-list');
  const count=bulkItems.length;
  document.getElementById('bulk-count').textContent=count+'件 スキャン済み';
  document.getElementById('bulk-form').style.display=count>0?'block':'none';
  // 商品カードがある時はボタン非表示・ない時は表示
  const rtWrap=document.getElementById('bulk-realtime-wrap');
  if(rtWrap)rtWrap.style.display=count===0?'block':'none';
  listEl.innerHTML='';
  // ⑤ 逆順表示（最新追加が上）・番号は追加順のまま
  [...bulkItems].reverse().forEach((item,revIdx)=>{
    const idx=bulkItems.length-1-revIdx;
    const card=document.createElement('div');
    card.className='ship-card';
    card.innerHTML=buildItemCardHTML(item,idx,'bulk');
    listEl.appendChild(card);
  });
  buildStatusChips('bulk-status-chips',ALL_STATUSES,()=>bulkStatus,s=>{bulkStatus=s;});
}
function saveBulk(){
  if(bulkItems.length===0){showToast('⚠️ 商品をスキャンしてください','err');return;}
  const buyDate=document.getElementById('bulk-buy-date').value;
  const buyPrice=document.getElementById('bulk-buy-price').value.replace(/[^0-9]/g,'');

  // ステータスが「出品」の場合は保存前に出品チェックを実行
  if(bulkStatus==='出品'){
    const productNos=bulkItems.map(i=>i.商品NO).filter(Boolean);
    if(productNos.length>0){
      showLoad('出品チェック中...');
      gasCall('checkOnSave',{productNos:productNos},res=>{
        hideLoad();
        if(res&&res.alerts&&res.alerts.length>0){
          // アラートあり→ポップアップで確認
          showDialog(
            '⚠️ 出品チェック警告',
            res.alerts.join('\n\n')+'\n\nこのまま保存しますか？',
            ()=>_executeBulkSave(bulkItems,buyDate,buyPrice),
            null
          );
        }else{
          // 問題なし→そのまま保存
          _executeBulkSave(bulkItems,buyDate,buyPrice);
        }
      },()=>{hideLoad();showToast('⚠️ 出品チェック通信エラー','err');});
      return;
    }
  }

  showDialog('一括保存の確認',bulkItems.length+'件をまとめて保存します\nよろしいですか？',
    ()=>_executeBulkSave(bulkItems,buyDate,buyPrice),null);
}

function _executeBulkSave(items,buyDate,buyPrice){
  showLoad('一括保存中...');
  const payload=items.map(item=>{
    const p={rowIndex:item.rowIndex};
    if(bulkStatus)p.ステータス=bulkStatus;
    if(buyDate)p.購入日=buyDate.replace(/-/g,'/');
    if(buyPrice)p.購入金額=Number(buyPrice);
    if(bulkShop)p.店名=bulkShop;if(bulkNameId)p.商品名ID=bulkNameId;
    if(bulkCondition)p.状態=bulkCondition;
    if(bulkStorageBarcode)p.保管バーコード=bulkStorageBarcode;
    if(bulkStockCheck==='有'||bulkStockCheck==='無')p.在庫確認=bulkStockCheck;
    return p;
  });
  gasCall('bulkUpdate',{items:payload},
    res=>{hideLoad();if(res&&res.ok){showToast('✅ '+res.updated+'件 保存しました');clearBulk();}else showToast('⚠️ 保存に失敗しました','err');},
    ()=>{hideLoad();showToast('⚠️ 通信エラー','err');});
}
function clearBulk(){
  bulkItems=[];bulkStatus='';bulkShop='';bulkNameId='';bulkNameLabel='';bulkCondition='';bulkStorageBarcode='';bulkStockCheck='';
  ['bulk-buy-date','bulk-buy-price'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('bulk-shop-val').textContent='選択してください';
  document.getElementById('bulk-name-val').textContent='選択してください';
  document.getElementById('bulk-condition-val').textContent='選択してください';
  document.getElementById('bulk-storage-val').textContent='';
  // 在庫確認チップをリセット
  document.getElementById('stock-chip-yes').classList.remove('sel');
  document.getElementById('stock-chip-no').classList.remove('sel');
  renderBulkList();
}
// ── ヤフオク管理ポップアップ ──
function openYahooPopup(){
  document.getElementById('yahoo-popup-result').textContent='';
  document.getElementById('yahoo-popup-ov').classList.add('open');
}
function closeYahooPopup(){
  document.getElementById('yahoo-popup-ov').classList.remove('open');
}
// アラート解除
function execClearAlerts(){
  const resultEl=document.getElementById('yahoo-popup-result');
  resultEl.textContent='解除中...';
  gasCall('clearAlerts',{},res=>{
    resultEl.textContent=res&&res.ok?'✅ アラートを解除しました':'⚠️ 解除に失敗しました';
  },()=>{resultEl.textContent='⚠️ 通信エラー';});
}
// リアルタイムチェック（複数回連続実行対応）
function execRealtimeCheck(){
  const resultEl=document.getElementById('yahoo-popup-result');
  resultEl.textContent='チェック実行中...';
  showToast('🔄 リアルタイムチェック実行中...','info');
  gasCall('processYahooMails',{},res=>{
    const msg=res&&res.processed!==undefined
      ?'✅ '+res.processed+'件処理しました'
      :'✅ チェック完了';
    resultEl.textContent=msg;
    showToast(msg);
  },()=>{
    resultEl.textContent='⚠️ 通信エラー';
    showToast('⚠️ 通信エラー','err');
  });
}
// ── 初期化 ──
function loadMasters(){
  showLoad('データ読み込み中...');
  // 販売済日デフォルト：今日
  const t=new Date();
  const today=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  document.getElementById('ship-sold-date').value=today;
  // 発送リスト初期化
  renderShipList();
  gasCall('getMasters',{},res=>{
    hideLoad();if(res&&res.ok)masters=res;
    buildStatusChips('ship-status-chips',SHIP_STATUSES,()=>shipStatus,s=>{shipStatus=s;});
    buildStatusChips('bulk-status-chips',ALL_STATUSES,()=>bulkStatus,s=>{bulkStatus=s;});
  },()=>{hideLoad();showToast('⚠️ マスタ読み込みエラー','err');});
}
loadMasters();
</script>
<!-- ヤフオク管理ポップアップ -->
<div class="yahoo-popup-ov" id="yahoo-popup-ov">
  <div class="yahoo-popup">
    <div class="yahoo-popup-title">🔍 ヤフオク管理</div>
    <div class="yahoo-popup-result" id="yahoo-popup-result"></div>
    <button class="yahoo-popup-btn clear" onclick="execClearAlerts()">✅ アラート解除</button>
    <button class="yahoo-popup-btn check" onclick="execRealtimeCheck()">🔄 リアルタイム・チェック</button>
    <button class="yahoo-popup-btn close" onclick="closeYahooPopup()">閉じる</button>
  </div>
</div>

</html>
